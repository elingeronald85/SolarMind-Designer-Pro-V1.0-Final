function recommendOptimalPanel(kwp_final) {
  // Busca el panel de mercado cuyo rango incluye el kWp del proyecto
  // y que produce entre 4 y 30 paneles (configuración viable)
  const candidates = MARKET_PANELS.filter(([kmin, kmax]) =>
    kwp_final >= kmin && kwp_final <= kmax
  );
  // Si hay varios candidatos, elegir el que produce el rango de paneles más centrado (8–16)
  let best = null, bestScore = Infinity;
  const pool = candidates.length ? candidates : MARKET_PANELS;
  for (const row of pool) {
    const [,, wp, voc, vmp, imp, isc, coef_voc, price, name] = row;
    const n = Math.ceil((kwp_final * 1000) / wp);
    // Target: 8 paneles. Penalizar desviación
    const dist = Math.abs(n - 10);
    if (dist < bestScore) { bestScore = dist; best = { wp, voc, vmp, imp, isc, coef_voc, price, name, n_needed: n }; }
  }
  return { ...best, recommended: true };
}

function calculate(inputs, catalog) {
  const steps = [], warnings = [], info = [];
  const {
    consumo_mensual_kwh, precio_kwh_cop, region, tipo_sistema,
    porcentaje_cobertura = 1.0, dias_autonomia = 2,
    panel_wp_custom, panel_voc_custom, panel_vmp_custom,
    panel_imp_custom, panel_isc_custom, panel_coef_voc_custom,
    mppt_voc_max_custom, hsp_manual, temp_min_manual,
    perdidas_manual, margen_manual, tension_banco_manual, demanda_max_kw,
    nombre_proyecto = "Proyecto sin nombre", nombre_cliente = "",
    advanced_mode = false
  } = inputs;

  const rk = (region || "").toLowerCase().trim();

  // ── PASO 1: Recurso solar ─────────────────────────────────────────────────
  let hsp = hsp_manual ? Number(hsp_manual) : (HSP[rk] ?? HSP.default);
  let hsp_src = hsp_manual ? "valor ingresado manualmente" : (HSP[rk] ? `tabla interna — ${rk}` : "valor por defecto (4.5 h/día)");
  if (!HSP[rk] && !hsp_manual) warnings.push(`HSP no encontrado para "${region}". Se usó ${hsp} h/día como valor de referencia. En Modo Avanzado puede ingresar el valor real de PVGIS.`);

  let temp_min = (temp_min_manual !== undefined && temp_min_manual !== "" && temp_min_manual !== null) ? Number(temp_min_manual) : (TEMP[rk] ?? TEMP.default);
  let temp_src = (temp_min_manual !== undefined && temp_min_manual !== "") ? "valor manual" : (TEMP[rk] !== undefined ? `tabla interna — ${rk}` : "valor por defecto (10°C)");

  steps.push({
    num: 1, title: "Recurso solar y temperatura de diseño",
    content: {
      formula: `HSP = ${hsp} h/día\nT_min_diseño = ${temp_min} °C`,
      explain: `La HSP (Hora Solar Pico) representa las horas equivalentes de irradiancia de 1000 W/m² que recibe la superficie en un día promedio. Es el parámetro más crítico del dimensionamiento: a mayor HSP, menos paneles se necesitan. Se obtiene idealmente de PVGIS o de mediciones locales. La temperatura mínima de diseño se usa para calcular el voltaje de circuito abierto en condición fría extrema (Voc_frío), que determina el límite superior de seguridad del MPPT.`,
      values: [["HSP utilizado", `${hsp} h/día`, hsp_src], ["T mín diseño", `${temp_min} °C`, temp_src]],
    }
  });

  // ── PASO 2: Consumo diario ────────────────────────────────────────────────
  const e_dia = consumo_mensual_kwh / 30;
  steps.push({
    num: 2, title: "Consumo diario promedio",
    content: {
      formula: `E_día = Consumo_mensual / 30 días\n      = ${consumo_mensual_kwh} kWh ÷ 30\n      = ${e_dia.toFixed(3)} kWh/día`,
      explain: `Se divide el consumo mensual entre 30 días para obtener la energía promedio diaria. Este valor es la base de todo el dimensionamiento. Para mayor precisión, use el promedio de 3 meses de factura o el valor del mes de mayor consumo si desea cobertura total en picos.`,
      values: [["Consumo mensual", `${consumo_mensual_kwh} kWh/mes`, "entrada usuario"], ["E_día", `${e_dia.toFixed(3)} kWh/día`, "calculado"]],
    }
  });

  // ── PASO 3: Energía PV objetivo ───────────────────────────────────────────
  const e_pv = e_dia * porcentaje_cobertura;
  steps.push({
    num: 3, title: "Energía fotovoltaica objetivo (E_PV)",
    content: {
      formula: `E_PV = E_día × Cobertura\n     = ${e_dia.toFixed(3)} × ${porcentaje_cobertura} (${(porcentaje_cobertura*100).toFixed(0)}%)\n     = ${e_pv.toFixed(3)} kWh/día`,
      explain: `El porcentaje de cobertura define qué fracción del consumo se cubrirá con energía solar. Al 100% el sistema cubre toda la demanda en condiciones promedio. Al 80% se reduce el CAPEX pero se mantiene respaldo de red o generador. Para sistemas off-grid se recomienda 100%.`,
      values: [["Cobertura", `${(porcentaje_cobertura*100).toFixed(0)}%`, "entrada"], ["E_PV objetivo", `${e_pv.toFixed(3)} kWh/día`, "calculado"]],
    }
  });

  // ── PASO 4: Pérdidas y margen ─────────────────────────────────────────────
  let p_loss = (perdidas_manual !== "" && perdidas_manual !== undefined && perdidas_manual !== null) ? Number(perdidas_manual) : (tipo_sistema === "on-grid" ? 0.18 : 0.22);
  let margen = (margen_manual !== "" && margen_manual !== undefined && margen_manual !== null) ? Number(margen_manual) : 1.15;

  steps.push({
    num: 4, title: "Factor de pérdidas y margen de diseño",
    content: {
      formula: `P_loss = ${(p_loss*100).toFixed(1)}%  →  Factor rendimiento = ${(1-p_loss).toFixed(3)}\nMargen práctico (FD) = ${margen}`,
      explain: `Las pérdidas del sistema (P_loss) incluyen: polvo/suciedad en panel (~3%), degradación anual (~1%/año), pérdidas por temperatura (~5-8%), resistencia en cables (~2%), eficiencia del inversor/MPPT (~3-5%), y desajuste entre paneles (~1%). El margen práctico (FD=1.15 ≡ 15%) compensa incertidumbres de diseño, instalación subóptima y variabilidad climática. Para sistemas off-grid se aplica mayor pérdida (22%) por incluir pérdidas del banco de baterías (carga/descarga, conversión DC-DC).`,
      values: [["Tipo sistema", tipo_sistema, ""], ["Pérdidas totales", `${(p_loss*100).toFixed(1)}%`, perdidas_manual ? "manual" : "automático"], ["Margen FD", margen, margen_manual ? "manual" : "default 1.15"]],
    }
  });

  // ── PASO 5: kWp requerido ─────────────────────────────────────────────────
  const kwp_base = e_pv / (hsp * (1 - p_loss));
  const kwp_final = kwp_base * margen;
  steps.push({
    num: 5, title: "Potencia pico fotovoltaica requerida (kWp)",
    content: {
      formula: `kWp_base = E_PV / (HSP × (1 − P_loss))\n         = ${e_pv.toFixed(3)} / (${hsp} × (1 − ${p_loss.toFixed(3)}))\n         = ${e_pv.toFixed(3)} / ${(hsp*(1-p_loss)).toFixed(4)}\n         = ${kwp_base.toFixed(4)} kWp\n\nkWp_final = kWp_base × FD_margen\n          = ${kwp_base.toFixed(4)} × ${margen}\n          = ${kwp_final.toFixed(4)} kWp`,
      explain: `Esta es la fórmula fundamental del dimensionamiento FV. Divide la energía que el campo solar debe producir cada día entre la producción unitaria real (HSP ajustada por pérdidas). Representa los Watts pico mínimos que debe tener el generador fotovoltaico para satisfacer la demanda. El margen práctico asegura que ante cualquier desviación de los supuestos, el sistema siga siendo suficiente.`,
      values: [["kWp base (sin margen)", kwp_base.toFixed(4) + " kWp", "calculado"], ["kWp final (con margen)", kwp_final.toFixed(4) + " kWp", "diseño"]],
    }
  });

  // ── PASO 6: Panel seleccionado ────────────────────────────────────────────
  let panel, panel_source;
  if (advanced_mode && panel_wp_custom) {
    panel = { wp: Number(panel_wp_custom), voc: Number(panel_voc_custom), vmp: Number(panel_vmp_custom), imp: Number(panel_imp_custom), isc: Number(panel_isc_custom), coef_voc: Number(panel_coef_voc_custom), name: `Panel personalizado ${panel_wp_custom}Wp`, recommended: false };
    panel_source = "Datos STC ingresados manualmente en Modo Avanzado";
  } else {
    const cat_panel = selectBestPanel(kwp_final, catalog);
    if (cat_panel) {
      panel = cat_panel;
      panel_source = `Selección automática del catálogo — mejor relación costo/rendimiento`;
    } else {
      panel = recommendOptimalPanel(kwp_final);
      panel_source = "Recomendación automática — panel típico de mercado";
    }
    info.push({ type: "panel_rec", panel });
  }

  // ── PRE-CÁLCULO DE STRINGS (necesario ANTES del Step 6 para tener n_tot correcto) ──────
  // El número de paneles definitivo depende de la configuración de strings, no solo del kWp.
  // En on-grid con Voc_max=600V un panel de Voc=50V requiere mínimo ~10 en serie.
  // Si n_serie > n_paneles_kwp → n_tot > n_paneles_kwp → se sobredimensiona por requerimiento de string.

  // Temperatura mínima histórica (definida en Paso 1 pero necesaria aquí)
  // Se recalcula con la misma lógica del Paso 1 para evitar dependencia de orden
  const _temp_min_pre = (temp_min_manual !== undefined && temp_min_manual !== "" && temp_min_manual !== null)
    ? Number(temp_min_manual) : (TEMP[rk] ?? TEMP.default);

  const voc_max_default = tipo_sistema === "on-grid" ? 600 : 150;
  const mppt_voc_max_val = mppt_voc_max_custom && mppt_voc_max_custom !== "" ? Number(mppt_voc_max_custom) : voc_max_default;

  const _voc_frio_pre = panel.voc * (1 + panel.coef_voc * (_temp_min_pre - 25));
  const _voc_lim_pre  = mppt_voc_max_val * 0.90;
  const _n_serie_pre  = Math.max(1, Math.floor(_voc_lim_pre / _voc_frio_pre));

  // n_paneles_kwp: paneles mínimos por potencia (sin considerar strings)
  const n_paneles_kwp   = Math.ceil((kwp_final * 1000) / panel.wp);
  // n_paneles_str: paneles mínimos para completar al menos un string completo
  const n_paneles_str   = _n_serie_pre * Math.max(1, Math.ceil(n_paneles_kwp / _n_serie_pre));
  // n_paneles: el MÁXIMO de los dos — siempre consistente con la configuración eléctrica
  const n_paneles       = Math.max(n_paneles_kwp, n_paneles_str);
  const n_paneles_exacto = (kwp_final * 1000) / panel.wp; // para mostrar en fórmula

  // Detectar si hubo sobredimensión por requerimiento de string
  const string_oversize = n_paneles > n_paneles_kwp;
  const kwp_inst = (n_paneles * panel.wp) / 1000;

  if (string_oversize) {
    warnings.push(`⚠️ El arreglo requiere ${n_paneles} paneles (en vez de ${n_paneles_kwp}) porque la configuración de strings del ${tipo_sistema === "on-grid" ? "inversor on-grid" : "controlador"} exige mínimo ${_n_serie_pre} paneles en serie para alcanzar el voltaje de operación MPPT. El sistema quedará sobredimensionado a ${kwp_inst.toFixed(2)} kWp (${(((kwp_inst/((n_paneles_kwp*panel.wp)/1000))-1)*100).toFixed(0)}% más de lo calculado). Considere cambiar el panel o ingresar el Voc_max real del equipo en Modo Avanzado.`);
  }

  steps.push({
    num: 6, title: "Selección de panel y número de módulos",
    content: {
      formula: `N_paneles_kWp = ⌈ (kWp_final × 1000) / Wp_panel ⌉\n             = ⌈ (${kwp_final.toFixed(4)} × 1000) / ${panel.wp} ⌉\n             = ⌈ ${n_paneles_exacto.toFixed(3)} ⌉\n             = ${n_paneles_kwp} paneles (por potencia)\n\n${string_oversize
        ? `⚠️ AJUSTE POR CONFIGURACIÓN DE STRINGS:\n   Inversor ${tipo_sistema === "on-grid" ? "on-grid" : "MPPT"} Voc_max=${mppt_voc_max_val}V → N_serie_mín=${_n_serie_pre}\n   Para completar ${Math.ceil(n_paneles_kwp/_n_serie_pre)} string(s) completo(s): ${_n_serie_pre}S × ${Math.ceil(n_paneles_kwp/_n_serie_pre)}P = ${n_paneles} paneles\n   → N_paneles FINAL = ${n_paneles} (ajustado por string)\n`
        : `✅ N_paneles = ${n_paneles} (sin ajuste de string necesario)\n`}\nkWp instalado = ${n_paneles} × ${panel.wp} / 1000 = ${kwp_inst.toFixed(3)} kWp\n\n── Costo por Wp en catálogo: ${panel.cop_por_w || Math.round((panel.price||0)/panel.wp)} COP/W\n── Razón de selección: menor costo por kWp instalado (${panel.cop_por_kwp ? panel.cop_por_kwp.toLocaleString("es-CO") : "—"} COP/kWp)${panel._alternatives?.length ? "\n\n── ALTERNATIVAS TÉCNICAMENTE VIABLES:\n" + panel._alternatives.map((a,i) => `   ${i+2}. ${a.name} — ${a.wp}Wp, N_kWp=${a.n_needed}, $${a.cop_por_w}/W ($${a.cop_por_kwp.toLocaleString("es-CO")}/kWp)`).join("\n") : ""}`,
      explain: `${string_oversize
        ? `⚠️ SOBREDIMENSIÓN POR REQUERIMIENTO ELÉCTRICO: el panel seleccionado (${panel.name}, Voc=${panel.voc}V) en el inversor con Voc_max=${mppt_voc_max_val}V necesita mínimo ${_n_serie_pre} paneles en serie para alcanzar el voltaje de operación del MPPT. Como el proyecto solo necesitaba ${n_paneles_kwp} paneles por kWp, se ajustó a ${n_paneles} paneles para completar al menos un string completo. Esto es técnicamente correcto pero implica mayor inversión.\n\nSOLUCIONES ALTERNATIVAS: (1) Cambiar a un panel con menor Voc (ej: Restar 210W, Voc=23.95V) que permite strings más cortos y se ajusta mejor al kWp requerido. (2) Ingresar en Modo Avanzado el Voc_max real del inversor que va a usar. (3) Considerar microinversores o un inversor con rango MPPT de arranque bajo.\n\n`
        : `Se redondea siempre hacia ARRIBA (⌈ ⌉ = techo) para no quedar por debajo del kWp requerido.\n\n`}CRITERIO DE SELECCIÓN: se elige el panel con el MENOR COSTO POR kWp INSTALADO, incluyendo precio del panel más costo proporcional de estructura (~$95.000 COP/panel). Un panel más potente puede ser más económico en total porque necesita menos unidades.\n\nPanel seleccionado: ${panel.name} — ${panel_source}.${panel._alternatives?.length ? "\n\nAlternativas listadas: técnicamente viables, pueden preferirse por disponibilidad o para obtener mejor configuración de strings." : ""}`,
      values: [
        ["Panel óptimo",       panel.name,                panel_source],
        ["Potencia panel",     `${panel.wp} Wp`,           "STC"],
        ["Precio unitario",    `$${(panel.price||0).toLocaleString("es-CO")} COP`, `$${panel.cop_por_w||Math.round((panel.price||0)/panel.wp)} COP/W`],
        ["N paneles (kWp)",    `${n_paneles_kwp} unidades`, "cálculo energético"],
        string_oversize ? ["N paneles (ajustado)", `${n_paneles} unidades ⚠️`, `+${n_paneles-n_paneles_kwp} por string mín. de ${_n_serie_pre}`] : null,
        ["kWp instalado",      `${kwp_inst.toFixed(3)} kWp`, string_oversize ? "⚠️ sobredimensionado por string" : "real"],
        ...(panel._alternatives||[]).map((a,i) => [`Alt. ${i+2}: ${a.name}`, `${a.wp}Wp × ${a.n_needed} ud`, `$${a.cop_por_w}/W (+${Math.round((a.cop_por_kwp - (panel.cop_por_kwp||0))/1000)}k/kWp)`])
      ].filter(Boolean),
    }
  });

  // ── PASO 7: Tensión del sistema ────────────────────────────────────────────
  let v_bat, v_justif, v_src;
  if (tipo_sistema === "on-grid") {
    // On-grid: no hay banco de baterías. La "tensión" se refiere al rango MPPT del inversor string.
    v_bat = 0; v_src = "on-grid (sin banco baterías)";
    v_justif = `Sistema ON-GRID: no existe banco de baterías, por lo tanto no hay tensión de banco CC. La arquitectura DC se define por el rango de tensión MPPT del inversor string (típicamente 200–800 VDC). La configuración de strings (Step 8) se calcula con el Voc_max del inversor on-grid.`;
  } else if (tension_banco_manual && tension_banco_manual !== "") {
    v_bat = Number(tension_banco_manual); v_src = "manual";
    v_justif = `Tensión definida manualmente: ${v_bat}V.`;
  } else if (e_dia > 3) {
    v_bat = 48; v_src = "automático";
    v_justif = `E_día = ${e_dia.toFixed(2)} kWh/día > 3 kWh → Se recomienda 48V. A mayor tensión, menor corriente (I = P/V), lo que reduce las pérdidas en cableado (∝ I²·R), permite cables de menor sección y mejora la eficiencia del sistema.`;
  } else if (e_dia >= 1) {
    v_bat = 24; v_src = "automático";
    v_justif = `E_día = ${e_dia.toFixed(2)} kWh/día entre 1–3 kWh → 24V es suficiente y equilibra costo vs pérdidas.`;
  } else {
    v_bat = 12; v_src = "automático";
    v_justif = `E_día = ${e_dia.toFixed(2)} kWh/día < 1 kWh → 12V viable para sistemas muy pequeños.`;
  }
  const v_bat_calc = tipo_sistema === "on-grid" ? 48 : v_bat; // para cálculos de corriente internos
  steps.push({
    num: 7, title: "Tensión del sistema (banco CC)",
    content: {
      formula: tipo_sistema === "on-grid"
        ? `Sistema ON-GRID — Sin banco de baterías.\nTensión MPPT inversor string: 200–800 VDC (según modelo).\nVer Step 8 para configuración de strings.`
        : `V_banco = ${v_bat} V  (${v_src})\n\nJustificación técnica:\n${v_justif}`,
      explain: tipo_sistema === "on-grid"
        ? `En sistemas on-grid el inversor string trabaja directamente con la tensión del arreglo fotovoltaico. No hay banco de baterías. El rango de tensión MPPT del inversor (ej: 200–800 VDC) define cuántos paneles se pueden conectar en serie. La configuración de strings se calcula en el Paso 8 con el Voc_max real del inversor seleccionado. Para on-grid siempre ingrese el Voc_max real del inversor en Modo Avanzado.`
        : `La tensión del sistema define toda la arquitectura eléctrica: paneles, controlador, inversor y baterías deben ser compatibles. Una tensión alta reduce la corriente en cada conductor, disminuye las pérdidas óhmicas (P_pérd = I²·R) y permite usar cables más delgados. Para sistemas residenciales de más de 3 kWh/día, 48V es el estándar de la industria.`,
      values: tipo_sistema === "on-grid"
        ? [["Tipo", "On-Grid — sin banco baterías", ""], ["Tensión MPPT inversor", "200–800 VDC", "según modelo"]]
        : [["Tensión banco", `${v_bat} V`, v_src], ["Corriente de carga aprox.", `${((kwp_inst*1000*0.95)/v_bat).toFixed(1)} A`, "estimado"]],
    }
  });

  // ── PASO 8: Configuración strings ─────────────────────────────────────────
  // Las variables _n_serie_pre, mppt_voc_max_val, _voc_frio_pre ya se calcularon
  // en el pre-cálculo del Paso 6. Aquí se reutilizan con nombres definitivos.
  const mppt_voc_max = mppt_voc_max_val;
  const voc_frio     = _voc_frio_pre;
  const voc_lim      = _voc_lim_pre;
  const n_serie      = _n_serie_pre;
  const n_par        = Math.max(1, Math.ceil(n_paneles / n_serie));
  const n_tot        = n_serie * n_par; // = n_paneles (ya ajustado en Paso 6)
  const voc_str      = voc_frio * n_serie;
  const vmp_str      = panel.vmp * n_serie;

  // Vmp en caliente (temperatura de celda real en operación = ~70°C)
  const temp_celda_max    = 70;
  const vmp_caliente      = panel.vmp * (1 + panel.coef_voc * (temp_celda_max - 25));
  const vmp_str_caliente  = vmp_caliente * n_serie;

  const vmp_min_mppt = tipo_sistema === "on-grid" ? 150 : Math.round(v_bat_calc * 1.15);
  if (voc_str > mppt_voc_max * 0.95) warnings.push(`⚠️ Voc_string_frío (${voc_str.toFixed(1)}V) muy cercano al límite Voc_max del equipo (${mppt_voc_max}V). Considere reducir N_serie.`);
  if (vmp_str_caliente < vmp_min_mppt) warnings.push(`⚠️ Vmp_string en caliente (${vmp_str_caliente.toFixed(1)}V) puede estar por debajo del mínimo MPPT (${vmp_min_mppt}V). Revise el modelo de inversor o reduzca el tipo de panel.`);

  steps.push({
    num: 8, title: "Configuración del arreglo fotovoltaico (series × paralelos)",
    content: {
      formula: `1. Voc_panel_frío (T_min=${temp_min}°C):\n   = Voc_STC × (1 + α_Voc × (T_min − 25))\n   = ${panel.voc} × (1 + (${panel.coef_voc}) × (${temp_min} − 25))\n   = ${voc_frio.toFixed(3)} V  ← límite SUPERIOR de seguridad\n\n2. Vmp_panel_caliente (T_celda=${temp_celda_max}°C):\n   = Vmp_STC × (1 + α_Voc × (${temp_celda_max} − 25))\n   = ${panel.vmp} × (1 + (${panel.coef_voc}) × (${temp_celda_max} − 25))\n   = ${vmp_caliente.toFixed(3)} V  ← límite INFERIOR de trabajo\n\n3. Voc_max ${tipo_sistema === "on-grid" ? "inversor on-grid" : "controlador MPPT"} = ${mppt_voc_max} V ${mppt_voc_max === voc_max_default ? "(default "+tipo_sistema+")" : "(manual)"}\n   Límite diseño (90%) = ${mppt_voc_max} × 0.90 = ${voc_lim.toFixed(1)} V\n\n4. N_serie_máx = ⌊ ${voc_lim.toFixed(1)} / ${voc_frio.toFixed(3)} ⌋ = ${n_serie}\n\n5. N_paralelo = ⌈ ${n_paneles} paneles / ${n_serie} en serie ⌉ = ${n_par}\n\n6. Total paneles = ${n_serie}S × ${n_par}P = ${n_tot}\n\n7. Verificación:\n   Voc_string_frío = ${voc_frio.toFixed(2)} × ${n_serie} = ${voc_str.toFixed(1)} V  < ${mppt_voc_max}V ✅\n   Vmp_string_STC  = ${panel.vmp} × ${n_serie} = ${vmp_str.toFixed(1)} V\n   Vmp_string_70°C = ${vmp_caliente.toFixed(2)} × ${n_serie} = ${vmp_str_caliente.toFixed(1)} V  > ${vmp_min_mppt}V ${vmp_str_caliente >= vmp_min_mppt ? "✅" : "⚠️"}`,
      explain: `CONFIGURACIÓN DE STRINGS: cada string es una cadena de paneles en serie. El voltaje del string sube con más paneles en serie; la corriente sube con más strings en paralelo.\n\nVOC FRÍO (límite superior): α_Voc es negativo, por lo que en temperaturas bajas el Voc sube. Se calcula el peor caso (T_min histórica) para proteger el MPPT. Se aplica margen del 10% (solo 90% del Voc_max del equipo).\n\nVMP CALIENTE (límite inferior): a alta temperatura el Vmp baja. La temperatura de celda a irradiancia plena puede superar 70°C. Si Vmp_string_caliente cae por debajo del arranque MPPT, el sistema pierde eficiencia en horas de mayor radiación.\n\nVoc_max DEFAULT: ${tipo_sistema === "on-grid" ? "Para on-grid se asume 600V (inversor string estándar). Ingrese el Voc_max real en Modo Avanzado." : "Para off-grid/híbrido se asume 150V (MPPT estándar). Ingrese el Voc_max real del controlador en Modo Avanzado."}`,
      values: [
        ["Voc panel frío",       `${voc_frio.toFixed(2)} V`,       `T=${temp_min}°C → límite superior`],
        ["Vmp panel caliente",   `${vmp_caliente.toFixed(2)} V`,    `T_celda=70°C → límite inferior`],
        ["Voc_max equipo",       `${mppt_voc_max} V`,               tipo_sistema === "on-grid" ? "inversor string" : "MPPT controller"],
        ["Configuración",        `${n_serie}S × ${n_par}P = ${n_tot} paneles`, "diseño final"],
        ["Voc string frío",      `${voc_str.toFixed(1)} V`,         `< ${mppt_voc_max}V ✅`],
        ["Vmp string STC",       `${vmp_str.toFixed(1)} V`,         "punto operación nominal"],
        ["Vmp string 70°C",      `${vmp_str_caliente.toFixed(1)} V`, vmp_str_caliente >= vmp_min_mppt ? `> ${vmp_min_mppt}V ✅` : `< ${vmp_min_mppt}V ⚠️`],
      ],
    }
  });

  // ── PASO 9: Topología de control óptima ──────────────────────────────────
  const eta_mppt = 0.96;
  const v_bat_ref = (tipo_sistema === "on-grid" || v_bat === 0) ? 48 : v_bat; // referencia interna
  const i_carga = (kwp_inst * 1000 * eta_mppt) / v_bat_ref;
  const i_imp_total = panel.imp * n_par;
  const i_mppt_req = Math.max(i_carga, i_imp_total) * 1.25;

  // ── Selección del modelo MPPT independiente según corriente ──────────────
  const mppt_model  = i_mppt_req > 80 ? "Victron SmartSolar MPPT 150/100"
                    : i_mppt_req > 60 ? "Victron SmartSolar MPPT 150/60"
                    : i_mppt_req > 40 ? "EPEVER Tracer AN 4215BN 60A"
                    :                   "EPEVER Tracer AN 2215BN 30A";
  const mppt_cost   = i_mppt_req > 80 ? 1850000
                    : i_mppt_req > 60 ? 1100000
                    : i_mppt_req > 40 ?  680000
                    :                    420000;

  // ── Selección del modelo inversor onda pura independiente ────────────────
  const inv_pure_kw = demanda_max_kw ? Number(demanda_max_kw)
                    : Math.min(Math.max(kwp_inst * 1.25, 3), 12);
  const inv_pure_model = inv_pure_kw >= 4 ? "EPEVER Inversor Onda Pura 4kW 48V"
                       : inv_pure_kw >= 3 ? "GreenPoint 3kW 24V"
                       :                   "EPEVER 1.5kW 12V Onda Pura";
  const inv_pure_cost  = inv_pure_kw >= 4 ? 1906560
                       : inv_pure_kw >= 3 ? 1784640
                       :                    900000;

  // ── Selección del modelo inversor híbrido ────────────────────────────────
  const inv_hyb_kw    = Math.max(inv_pure_kw, 3.5);
  const inv_hyb_model = inv_hyb_kw >= 5  ? "EPEVER UP5000-HM8042 5kW 48V MPPT 450V"
                      : inv_hyb_kw >= 3.5 ? "EPEVER Inversor-Cargador 3.5kW 48V MPPT 250V"
                      :                     "Growatt SPF 3000TL LVM-ES 3kW 24V MPPT";
  const inv_hyb_cost  = inv_hyb_kw >= 5  ? 3300000
                      : inv_hyb_kw >= 3.5 ? 2915000
                      :                     2989000;
  const inv_hyb_mppt_incl = true; // Todos los híbridos incluyen MPPT

  // ── Costo comparado de cada arquitectura ─────────────────────────────────
  const cost_pwm_arch    = 200000 + inv_pure_cost;    // PWM + inversor puro
  const cost_mppt_arch   = mppt_cost + inv_pure_cost; // MPPT + inversor puro
  const cost_hybrid_arch = inv_hyb_cost;              // Inversor híbrido todo-en-uno

  // ── Condición PWM viable ─────────────────────────────────────────────────
  const can_use_pwm = (v_bat === 12 || v_bat === 24)
                    && kwp_inst <= 0.6
                    && Math.abs(panel.vmp - v_bat) / v_bat < 0.35;

  // ── DECISIÓN DE TOPOLOGÍA ────────────────────────────────────────────────
  // Reglas de negocio (costo-beneficio y tipo de sistema):
  //   on-grid     → siempre inversor string on-grid con MPPT integrado
  //   híbrido     → siempre inversor híbrido todo-en-uno (MPPT incluido)
  //   off-grid pequeño (≤0.6kWp, 12/24V, Vmp compatible) → evaluar PWM
  //   off-grid <5kWp → MPPT + inversor puro (mejor relación costo/rendimiento)
  //   off-grid ≥5kWp → comparar MPPT+inv vs híbrido; si diferencia <15% elegir híbrido
  let topo; // "ongrid" | "hybrid" | "mppt_pure" | "pwm_pure"
  if (tipo_sistema === "on-grid") {
    topo = "ongrid";
  } else if (tipo_sistema === "hibrido") {
    topo = "hybrid";
  } else {
    // off-grid
    if (can_use_pwm) {
      topo = "pwm_pure";
    } else if (kwp_inst < 5) {
      topo = "mppt_pure";
    } else {
      // Para sistemas grandes: comparar costo. Si el híbrido cuesta <20% más que MPPT+inv, preferir híbrido
      const delta_pct = (cost_hybrid_arch - cost_mppt_arch) / cost_mppt_arch;
      topo = (delta_pct <= 0.20) ? "hybrid" : "mppt_pure";
    }
  }

  // ── Descripción de la topología seleccionada ──────────────────────────────
  const TOPO_INFO = {
    ongrid: {
      label: "Inversor On-Grid con MPPT integrado",
      model: "GOODWE 6kW On-Grid 220VAC / Huawei On-Grid",
      cost: 3922560,
      kw: inv_pure_kw,
      includes_mppt: true,
      justificacion: `Sistema conectado a la red eléctrica. El inversor string on-grid incluye su propio seguidor MPPT. NO se requiere controlador de carga independiente ni banco de baterías (en configuración básica on-grid). Cumple Ley 1715/2014 y Res. CREG 030/2018 para autogeneración.`,
      equipo_ctrl: null,
      equipo_inv: "Inversor On-Grid con MPPT",
    },
    hybrid: {
      label: "Inversor Híbrido todo-en-uno (MPPT + cargador + inversor)",
      model: inv_hyb_model,
      cost: inv_hyb_cost,
      kw: inv_hyb_kw,
      includes_mppt: true,
      justificacion: `El inversor híbrido integra en un único equipo: seguidor MPPT (${Math.round(i_mppt_req)}A requerido), cargador de baterías, inversor senoidal puro y gestión de red/generador. Cotizar un controlador MPPT adicional sería innecesario y redundante — el inversor ya lo tiene incorporado. Costo total arquitectura híbrida: $${(inv_hyb_cost/1000000).toFixed(2)}M COP vs arquitectura MPPT+inversor separado: $${(cost_mppt_arch/1000000).toFixed(2)}M COP.`,
      equipo_ctrl: null,
      equipo_inv: `Inversor Híbrido ${inv_hyb_kw}kW (MPPT integrado)`,
    },
    mppt_pure: {
      label: "Controlador MPPT independiente + Inversor onda pura",
      model: `${mppt_model} + ${inv_pure_model}`,
      cost: cost_mppt_arch,
      kw: inv_pure_kw,
      includes_mppt: false,
      justificacion: `Para este sistema off-grid la arquitectura más eficiente en costo es el MPPT independiente (${Math.round(i_mppt_req)}A) + inversor onda pura por separado. Total: $${(cost_mppt_arch/1000000).toFixed(2)}M COP vs inversor híbrido todo-en-uno: $${(cost_hybrid_arch/1000000).toFixed(2)}M COP. La modularidad permite reemplazar cada componente por separado y facilita el diagnóstico de fallas.`,
      equipo_ctrl: `${mppt_model} (${Math.ceil(i_mppt_req)}A mín.)`,
      equipo_inv: `${inv_pure_model} ${inv_pure_kw.toFixed(1)}kW onda pura`,
    },
    pwm_pure: {
      label: "Controlador PWM + Inversor onda pura (sistema pequeño)",
      model: `Genérico PWM 20-30A 12/24V + ${inv_pure_model}`,
      cost: cost_pwm_arch,
      kw: inv_pure_kw,
      includes_mppt: false,
      justificacion: `Sistema muy pequeño (${kwp_inst.toFixed(2)} kWp, ${v_bat}V). El controlador PWM es viable porque Vmp_panel (${panel.vmp}V) es compatible con la tensión de banco (${v_bat}V) y la potencia instalada es reducida. Ahorro vs MPPT: $${((cost_mppt_arch - cost_pwm_arch)/1000).toFixed(0)}k COP. Para escalar el sistema en el futuro se recomienda migrar a MPPT.`,
      equipo_ctrl: "Controlador PWM 20-30A 12/24V",
      equipo_inv: `${inv_pure_model} ${inv_pure_kw.toFixed(1)}kW onda pura`,
    },
  };

  const selected_topo = TOPO_INFO[topo];

  // ctrl_options sigue existiendo en el summary para compatibilidad con tabs comparativos
  const ctrl_options = {
    mppt_solo: {
      name: "Controlador MPPT independiente",
      suitable: true,
      i_req: i_mppt_req.toFixed(1),
      voc_req: voc_str.toFixed(1),
      pros: ["Mayor eficiencia (+20-30% vs PWM)","Trabaja con Vmp del panel","Modular — reemplazo independiente","Estándar profesional"],
      cons: ["Requiere inversor externo adicional","Más cableado que solución todo-en-uno"],
      cost_est: mppt_cost,
      model: mppt_model,
      recommended: topo === "mppt_pure",
    },
    pwm: {
      name: "Controlador PWM",
      suitable: can_use_pwm,
      pros: ["Precio mínimo (~$150k-250k COP)","Tecnología robusta y simple"],
      cons: ["Solo viable ≤600W y 12/24V","Vmp debe ser compatible con Vbat","Eficiencia 15-25% menor que MPPT"],
      cost_est: 200000,
      model: "Genérico 12/24V 20-30A",
      recommended: topo === "pwm_pure",
    },
    hibrido: {
      name: "Inversor Híbrido c/MPPT integrado",
      suitable: tipo_sistema !== "on-grid",
      pros: ["Todo en uno: MPPT + cargador + inversor","Menos equipos y cableado","WiFi/app móvil incluido en muchos modelos"],
      cons: ["Si falla, todo el sistema queda inoperante","Menos modular"],
      cost_est: inv_hyb_cost,
      model: inv_hyb_model,
      recommended: topo === "hybrid",
    },
  };

  steps.push({
    num: 9, title: "Topología de control — selección óptima para el proyecto",
    content: {
      formula: `I_carga = (${(kwp_inst*1000).toFixed(0)}W × ${eta_mppt}) / ${v_bat_ref}V = ${i_carga.toFixed(1)} A\nI_imp_total = ${panel.imp}A × ${n_par} strings = ${i_imp_total.toFixed(1)} A\nI_MPPT_req = max(${i_carga.toFixed(1)}, ${i_imp_total.toFixed(1)}) × 1.25 = ${i_mppt_req.toFixed(1)} A\n\n── Costos por arquitectura ──────────────────────────────\n  PWM + inv. puro ........... $${(cost_pwm_arch/1000).toFixed(0)}k COP  ${topo==="pwm_pure"?"← SELECCIONADA":""}\n  MPPT indep. + inv. puro ... $${(cost_mppt_arch/1000).toFixed(0)}k COP  ${topo==="mppt_pure"?"← SELECCIONADA":""}\n  Inversor híbrido (todo-en-1) $${(cost_hybrid_arch/1000).toFixed(0)}k COP  ${topo==="hybrid"?"← SELECCIONADA":""}\n  On-Grid string inverter .... $${(3922560/1000).toFixed(0)}k COP  ${topo==="ongrid"?"← SELECCIONADA":""}\n\n⭐ TOPOLOGÍA RECOMENDADA: ${selected_topo.label}\n   Modelo: ${selected_topo.model}\n   MPPT incluido: ${selected_topo.includes_mppt?"Sí (no se cotiza aparte)":"No (se cotiza MPPT externo)"}`,
      explain: selected_topo.justificacion,
      values: [
        ["I_MPPT mínimo requerido", `${i_mppt_req.toFixed(1)} A`, "con margen 25%"],
        ["Voc string frío", `${voc_str.toFixed(1)} V`, "límite entrada MPPT"],
        ["Topología elegida", selected_topo.label, "costo-beneficio óptimo"],
        selected_topo.equipo_ctrl ? ["Controlador", selected_topo.equipo_ctrl, "cotizar"] : ["Controlador MPPT externo", "NO requerido", "integrado en inversor"],
        ["Inversor", selected_topo.equipo_inv, "cotizar"],
      ],
      ctrl_options,
      selected_topo,
    }
  });

  // ── PASO 10: Banco baterías ───────────────────────────────────────────────
  let bat = null;
  if (tipo_sistema !== "on-grid") {
    const e_util = e_dia * dias_autonomia;
    const c_lifepo4 = e_util / (0.9 * 0.97);
    const c_gel = e_util / (0.5 * 0.85);
    const c_agm = e_util / (0.6 * 0.85);
    const ah_lifepo4 = (c_lifepo4 * 1000) / v_bat;
    const ah_gel = (c_gel * 1000) / v_bat;
    const n_pylo = Math.ceil(c_lifepo4 / 4.8);
    const n_gel_s = Math.max(1, Math.round(v_bat / 6));
    const n_gel_p = Math.ceil(ah_gel / 225);
    const n_gel = n_gel_s * n_gel_p;
    const n_agm_s = Math.max(1, Math.round(v_bat / 12));
    const n_agm_p = Math.ceil((c_agm * 1000 / v_bat) / 200);
    const n_agm = n_agm_s * n_agm_p;
    const tco_lifepo4 = n_pylo * 4200000;
    const tco_gel = n_gel * 420000 * 3;
    const tco_agm = n_agm * 350000 * 3;
    bat = { e_util, c_lifepo4, c_gel, c_agm, ah_lifepo4, ah_gel, n_pylo, n_gel, n_agm, n_gel_s, n_gel_p, n_agm_s, n_agm_p, tco_lifepo4, tco_gel, tco_agm, capex_lifepo4: n_pylo*4200000, capex_gel: n_gel*420000, capex_agm: n_agm*350000 };
    steps.push({
      num: 10, title: "Banco de baterías — capacidad y configuración",
      content: {
        formula: `Energía útil requerida:\nE_útil = E_día × Días_autonomía = ${e_dia.toFixed(3)} × ${dias_autonomia} = ${e_util.toFixed(3)} kWh\n\n[LiFePO4] DoD=90%, η_ciclo=97%:\nC_nom = E_útil / (DoD × η) = ${e_util.toFixed(3)} / (0.90 × 0.97) = ${c_lifepo4.toFixed(3)} kWh\nAh = C_nom×1000 / V_bat = ${c_lifepo4.toFixed(3)}×1000 / ${v_bat} = ${ah_lifepo4.toFixed(1)} Ah\nConfiguración: ${n_pylo} módulo(s) Pylontech US5000 (4.8kWh/48V)\n\n[Gel] DoD=50%, η_ciclo=85%:\nC_nom = ${e_util.toFixed(3)} / (0.50 × 0.85) = ${c_gel.toFixed(3)} kWh\nAh = ${c_gel.toFixed(3)}×1000 / ${v_bat} = ${ah_gel.toFixed(1)} Ah\nConfiguración: ${n_gel_p}P × ${n_gel_s}S Trojan T-105 6V 225Ah`,
        explain: `La capacidad nominal del banco debe sobrepasar la energía útil requerida, corregida por la profundidad de descarga (DoD) y la eficiencia de ciclo. DoD=90% en LiFePO4 significa que puede usar el 90% de su capacidad sin degradarla significativamente. En baterías de plomo-ácido (Gel/AGM), el DoD se limita al 50-60% para proteger la vida útil — descargar más profundo acelera la sulfatación de las placas. Siempre conecte módulos idénticos en paralelo y luego en serie para igualar la tensión.`,
        values: [["E_útil", `${e_util.toFixed(3)} kWh`, `${dias_autonomia} días autonomía`], ["LiFePO4 recomendado", `${c_lifepo4.toFixed(2)} kWh → ${n_pylo} módulos`, ""], ["Gel alternativa", `${c_gel.toFixed(2)} kWh → ${n_gel_s}S×${n_gel_p}P módulos`, ""]],
      }
    });
  }

  // ── PASO 11: Inversor ─────────────────────────────────────────────────────
  const p_inv = selected_topo.kw;
  const p_peak = p_inv * 2;
  steps.push({
    num: tipo_sistema !== "on-grid" ? 11 : 10, title: "Dimensionado del inversor",
    content: {
      formula: `Topología seleccionada: ${selected_topo.label}\nModelo: ${selected_topo.model}\n\nP_continua = ${p_inv.toFixed(1)} kW\nP_pico arranque = ${p_inv.toFixed(1)} × 2 = ${p_peak.toFixed(1)} kW\n\n${selected_topo.includes_mppt ? "⚠ Este inversor ya incluye MPPT interno — NO se cotiza controlador aparte." : "ℹ El MPPT externo (" + (selected_topo.equipo_ctrl || "") + ") se cotiza por separado."}`,
      explain: `El inversor seleccionado es el óptimo para este proyecto según la lógica de costo-beneficio. La potencia pico (×2) cubre arranques inductivos (motores, bombas, AC). Onda senoidal pura es OBLIGATORIA para equipos residenciales y motores.`,
      values: [
        ["Topología", selected_topo.label, "óptima"],
        ["Modelo inversor", selected_topo.model, ""],
        ["P continua", `${p_inv.toFixed(1)} kW`, ""],
        ["P pico arranque", `${p_peak.toFixed(1)} kW`, "×2"],
        ["MPPT integrado", selected_topo.includes_mppt ? "Sí — no cotizar aparte" : "No — requiere MPPT externo", ""],
      ],
    }
  });

  // ── PASO 12: Cableado y protecciones ─────────────────────────────────────
  const rho = 0.0172;
  // L_dc estimada: 15m es más realista que 10m (panel→MPPT en instalación típica)
  const l_dc = 15;
  const s_raw = (2 * rho * l_dc * i_imp_total) / (0.03 * vmp_str);
  const s_norm = s_raw <= 4 ? 4 : s_raw <= 6 ? 6 : s_raw <= 10 ? 10 : s_raw <= 16 ? 16 : s_raw <= 25 ? 25 : 35;
  // CORRECCIÓN: fusible POR STRING = Isc_panel × 1.25 (NO multiplicar por n_par)
  // Cada string lleva su propio fusible. n_par strings = n_par fusibles individuales.
  const i_fuse_por_string = panel.isc * 1.25;
  const i_fuse_comercial = Math.ceil(i_fuse_por_string / 5) * 5;
  // Interruptor DC general (salida del combiner box → MPPT): corriente total
  const i_dc_total = i_imp_total * 1.25;
  steps.push({
    num: tipo_sistema !== "on-grid" ? 12 : 11, title: "Cableado DC y protecciones eléctricas",
    content: {
      formula: `Cable DC principal (combiner box → MPPT, L_est=${l_dc}m, ΔV≤3%):\nS = (2 × ρ_Cu × L × I_total) / (ΔV_max × V_mp_str)\n  = (2 × ${rho} × ${l_dc} × ${i_imp_total.toFixed(1)}) / (0.03 × ${vmp_str.toFixed(1)})\n  = ${s_raw.toFixed(3)} mm²  →  normalizado: ${s_norm} mm² AWG\n\nFusibles por string (${n_par} strings independientes):\nI_fuse = Isc_panel × 1.25 = ${panel.isc} × 1.25 = ${i_fuse_por_string.toFixed(1)} A por string\n→ Usar fusible de ${i_fuse_comercial} A × ${n_par} unidades (uno por cada string)\n\nInterruptor DC principal (combiner → MPPT):\nI_DC = I_total × 1.25 = ${i_imp_total.toFixed(1)} × 1.25 = ${i_dc_total.toFixed(1)} A\n→ Usar seccionador DC ≥ ${Math.ceil(i_dc_total/10)*10} A`,
      explain: `CABLE PRINCIPAL: conecta la salida del combiner box con el MPPT y conduce la corriente total del arreglo. La sección mínima se calcula para que la caída de tensión no supere el 3% de Vmp (mayor caída = pérdida directa de potencia). Los CABLES DE STRING individuales (panel a panel dentro de cada string) pueden ser 4mm² o 6mm² estándar solar.\n\nFUSIBLES DE STRING: protegen cada string contra corriente de retroalimentación desde strings paralelos en caso de fallo (cortocircuito en un panel). Se coloca UN fusible por string. Nunca usar un solo fusible para todo el arreglo. Según IEC 62548 / NEC 690.8: I_fuse = Isc × 1.25. Usar portafusibles MC4 de 1000VDC.\n\nINTERRUPTOR DC: permite desconectar todo el arreglo del MPPT con seguridad. RETIE exige que sea visible y accesible. Usar seccionador DC rated para tensión del Voc string frío (${voc_str}V mínimo).`,
      values: [
        ["Sección cable DC principal", `${s_norm} mm² Cu`, `ΔV≤3% a ${l_dc}m`],
        ["Fusible por string", `${i_fuse_comercial} A × ${n_par} uds`, "uno por cada string"],
        ["Interruptor DC general", `≥ ${Math.ceil(i_dc_total/10)*10} A`, "combiner→MPPT"],
        ["SPD DC", "Cat. II 1000VDC", "RETIE obligatorio"],
        ["Tensión rating DC", `≥ ${Math.ceil(parseFloat(voc_str)/50)*50} V`, "Voc string frío"],
      ],
    }
  });

  // ── PASO 13: Economía ─────────────────────────────────────────────────────
  // Ahorro: producción real estimada × tarifa (más preciso que consumo × cobertura)
  const gen_anual_kwh = kwp_inst * hsp * 365 * (1 - p_loss);
  const kwh_ahorrado_anual = Math.min(gen_anual_kwh, consumo_mensual_kwh * 12) * porcentaje_cobertura;
  const ah_mes = kwh_ahorrado_anual / 12 * precio_kwh_cop;
  const ah_ano = kwh_ahorrado_anual * precio_kwh_cop;

  // CAPEX usando precios reales de la topología seleccionada
  const cp = n_tot * (panel.price || 350000);
  // Costo de control/inversión: SOLO lo que realmente se compra según topología
  const c_topo = selected_topo.cost; // ya incluye MPPT si es híbrido/on-grid
  const cb = bat ? bat.capex_lifepo4 : 0;
  // Estructura: racks de 4 paneles inclinados
  const ce = Math.ceil(n_tot / 4) * 380000;
  // Cables, protecciones, SPD — escala con el tamaño del sistema
  const co = 800000 + Math.max(0, n_tot - 8) * 25000;
  // Mano de obra: 18% sobre materiales (estándar sector solar Colombia)
  const cmob = (cp + c_topo + cb + ce + co) * 0.18;
  const capex = cp + c_topo + cb + ce + co + cmob;

  // Payback y ROI
  const payback = ah_ano > 0 ? capex / ah_ano : Infinity;
  // ROI a 10 años con degradación 0.5%/año y escalada de tarifa 8%/año
  let flujo_acum = -capex;
  for (let y = 1; y <= 10; y++) {
    const degradacion = Math.pow(1 - 0.005, y);
    const escala_tarifa = Math.pow(1.08, y);
    flujo_acum += kwh_ahorrado_anual * degradacion * precio_kwh_cop * escala_tarifa;
  }
  const roi_10 = (flujo_acum / capex) * 100;

  // Desglose CAPEX para gráfica (mantiene estructura del summary)
  const capex_detail = {
    paneles: cp,
    equipo_control: c_topo,  // renombrado de "mppt" a "equipo_control" para mayor claridad
    baterias: cb,
    estructura: ce,
    otros: co,
    mano_obra: Math.round(cmob),
  };

  const topo_label_corto = topo === "hybrid" ? "Inv. Híbrido" : topo === "ongrid" ? "Inv. On-Grid" : topo === "mppt_pure" ? "MPPT + Inversor" : "PWM + Inversor";

  steps.push({
    num: tipo_sistema !== "on-grid" ? 13 : 12, title: "Análisis económico y rentabilidad",
    content: {
      formula: `Generación anual estimada:\nE_gen = kWp × HSP × 365 × (1 − P_loss)\n      = ${kwp_inst.toFixed(3)} × ${hsp} × 365 × (1 − ${p_loss.toFixed(2)})\n      = ${gen_anual_kwh.toFixed(0)} kWh/año\n\nAhorro anual (energía solar aprovechada × tarifa):\nAhorro = ${kwh_ahorrado_anual.toFixed(0)} kWh × $${precio_kwh_cop.toLocaleString("es-CO")}/kWh\n       = $${Math.round(ah_ano).toLocaleString("es-CO")} COP/año\n\nCAPEX (inversión inicial):\n  Paneles (${n_tot}u × $${(panel.price||350000).toLocaleString("es-CO")}) ... $${cp.toLocaleString("es-CO")}\n  ${topo_label_corto} (${selected_topo.model.slice(0,30)}) ........ $${c_topo.toLocaleString("es-CO")}\n  Baterías ......................... $${cb.toLocaleString("es-CO")}\n  Estructura ........................ $${ce.toLocaleString("es-CO")}\n  Cables y protecciones ............. $${Math.round(co).toLocaleString("es-CO")}\n  Mano de obra (18%) ................ $${Math.round(cmob).toLocaleString("es-CO")}\n  ─────────────────────────────────────\n  TOTAL ............................ $${Math.round(capex).toLocaleString("es-CO")} COP\n\nPayback simple = $${Math.round(capex).toLocaleString("es-CO")} / $${Math.round(ah_ano).toLocaleString("es-CO")} = ${payback === Infinity ? "∞" : payback.toFixed(1)} años\nROI 10 años (con degradación 0.5%/a y escalada tarifa 8%/a) = ${roi_10.toFixed(1)}%`,
      explain: `El payback simple indica en cuántos años el ahorro acumulado recupera la inversión inicial. En Colombia, un sistema bien dimensionado tiene payback de 5–9 años on-grid y 8–14 años off-grid. La generación anual considera pérdidas del sistema (${(p_loss*100).toFixed(0)}%) aplicadas sobre la producción bruta. El ROI a 10 años usa degradación real del panel (~0.5%/año) y escalada histórica de tarifas eléctricas en Colombia (~8%/año), lo que da un resultado más realista que el cálculo con tarifa fija.`,
      values: [
        ["Generación anual", `${Math.round(gen_anual_kwh).toLocaleString("es-CO")} kWh/año`, "estimada con pérdidas"],
        ["Ahorro anual", `$${Math.round(ah_ano).toLocaleString("es-CO")} COP`, "estimado"],
        ["CAPEX total", `$${Math.round(capex).toLocaleString("es-CO")} COP`, "inversión inicial"],
        ["Payback", payback === Infinity ? "∞" : `${payback.toFixed(1)} años`, "simple"],
        ["ROI 10 años", `${roi_10.toFixed(1)}%`, "con inflación y degradación"],
      ],
    }
  });

  return {
    inputs, steps, warnings, info,
    panel,
    ctrl_options,
    topo,
    selected_topo,
    summary: {
      kwp_final: kwp_final.toFixed(3), kwp_inst: kwp_inst.toFixed(3),
      n_paneles: n_tot, n_serie, n_par,
      panel_name: panel.name, panel_wp: panel.wp,
      hsp, temp_min, v_bat,
      voc_str: voc_str.toFixed(1), vmp_str: vmp_str.toFixed(1),
      i_mppt_req: i_mppt_req.toFixed(1),
      p_inv: p_inv.toFixed(1), s_norm, i_fuse: i_fuse_por_string.toFixed(1),
      ah_mes: Math.round(ah_mes), ah_ano: Math.round(ah_ano),
      capex: Math.round(capex), payback: payback === Infinity ? 99 : parseFloat(payback.toFixed(1)),
      bat, ctrl: ctrl_options,
      topo, selected_topo,
      capex_detail,
      // Alias para compatibilidad con gráficas existentes
      get capex_detail_legacy() {
        return {
          paneles: capex_detail.paneles,
          mppt: topo === "mppt_pure" || topo === "pwm_pure" ? ctrl_options.mppt_solo.cost_est : 0,
          inversor: capex_detail.equipo_control,
          baterias: capex_detail.baterias,
          estructura: capex_detail.estructura,
          otros: capex_detail.otros,
          mano_obra: capex_detail.mano_obra,
        };
      }
    }
  };
}

// ── HELPERS ────────────────────────────────────────────────────────────────────
const fmt = n => Number(n).toLocaleString("es-CO");
const fmtM = n => (Number(n)/1000000).toFixed(2) + "M";

function Tooltip({ text }) {
  return <span className="tooltip-icon">?<span className="tooltip-box">{text}</span></span>;
}

function Field({ label, hint, tooltip, children }) {
  return <div className="field">
    <div className="field-lbl">{label}{tooltip && <Tooltip text={tooltip}/>}</div>
    {children}
    {hint && <div className="field-hint">{hint}</div>}
  </div>;
}

function KPI({ val, unit, label, color }) {
  return <div className="kpi">
    <div className="kpi-val" style={color ? { color } : {}}>{val}</div>
    {unit && <div className="kpi-unit">{unit}</div>}
    <div className="kpi-lbl">{label}</div>
  </div>;
}

function Step({ step, defaultOpen }) {
  const [open, setOpen] = useState(defaultOpen || false);
  const c = step.content;
  return <div className="step">
    <div className="step-hdr" onClick={() => setOpen(o => !o)}>
      <div className="step-hdr-left">
        <div className="step-num">{step.num}</div>
        <div className="step-title">{step.title}</div>
      </div>
      <span style={{ color: "var(--text3)", fontSize: ".75rem" }}>{open ? "▲" : "▼"}</span>
    </div>
    {open && <div className="step-body">
      {c.explain && <div className="explain-box">ℹ️ {c.explain}</div>}
      {c.formula && <div className="formula-block" style={{ whiteSpace: "pre-wrap" }}>{c.formula}</div>}
      {c.values && c.values.length > 0 && <div style={{ marginTop: ".75rem" }}>
        <div style={{ fontSize: ".7rem", fontWeight: 600, color: "var(--text3)", textTransform: "uppercase", letterSpacing: ".06em", marginBottom: ".4rem" }}>Resumen de valores</div>
        {c.values.map(([k, v, s], i) => <div key={i} className="info-row">
          <span className="info-key">{k}</span>
          <span style={{ display: "flex", gap: ".5rem", alignItems: "center" }}>
            <span className="info-val">{v}</span>
            {s && <span style={{ fontSize: ".68rem", color: "var(--text3)" }}>{s}</span>}
          </span>
        </div>)}
      </div>}
      {c.ctrl_options && <CtrlCompare opts={c.ctrl_options} />}
    </div>}
  </div>;
}

function CtrlCompare({ opts }) {
  const recommended = Object.values(opts).find(o => o.recommended);
  const conclusions = {
    "MPPT Solo": `El controlador MPPT independiente es la opción óptima para este proyecto. Al separar las funciones de control de carga y conversión AC, se maximiza la flexibilidad: puede reemplazar el inversor sin cambiar el controlador (y viceversa), y permite monitoreo independiente de cada etapa. El MPPT realiza seguimiento del Punto de Máxima Potencia de los paneles en tiempo real, extrayendo hasta un 30% más energía que un controlador PWM convencional, especialmente en días nublados o con variaciones de temperatura. Para sistemas off-grid e híbridos medianos/grandes en Colombia, donde la radiación varía significativamente entre épocas secas y lluviosas, el MPPT solo es la configuración más eficiente y serviciable. Asegúrese de que la tensión Voc del string en frío no supere el límite máximo de entrada del controlador (con margen del 15% por RETIE Art. 30).`,
    "Inversor-Cargador MPPT": `El inversor-cargador todo-en-uno es la solución óptima para este proyecto. Al integrar inversor senoidal, controlador MPPT y cargador de baterías en un solo equipo, se reduce la complejidad del cableado, se minimiza el espacio de instalación y se centraliza el monitoreo. Equipos como Victron MultiPlus, Growatt SPF o Voltronic Axpert ofrecen protocolos de comunicación BMS para baterías LiFePO4, gestión de prioridades (solar/batería/red) y transferencia automática en menos de 20ms. Para proyectos colombianos con cargas sensibles (equipos médicos, refrigeración, telecomunicaciones) o donde el espacio de instalación es limitado, esta configuración garantiza mayor confiabilidad operativa. Cumple con RETIE para equipos de conversión de energía con certificación IEC 62109.`,
    "Híbrido On-Grid": `El inversor híbrido on-grid es la alternativa recomendada para este sistema. Permite operar conectado a la red eléctrica con inyección de excedentes (Ley 1715 de 2014 y Resolución CREG 030 de 2018), mientras mantiene respaldo en baterías para cortes de suministro. Esta configuración es ideal para usuarios con tarifas de energía elevadas que quieren reducir la factura sin perder la seguridad del suministro de red. La gestión inteligente de energía optimiza el autoconsumo: prioriza el consumo solar durante el día, carga baterías con excedentes, y vende a la red solo el sobrante. Para la legalización ante la distribuidora local, debe tramitar el Registro Único de Autogeneradores ante la UPME y cumplir con la medición bidireccional.`
  };
  const conclusionText = recommended ? (conclusions[recommended.name] || `El controlador ${recommended.name} (${recommended.model}) es la opción recomendada para este sistema según los parámetros calculados. Verifique que la tensión Voc del string en frío no supere el límite máximo de entrada del controlador, con un margen de seguridad del 15% según RETIE. Instale fusibles de protección en cada string y un SPD tipo 2 en el lado DC.`) : "";

  return <div style={{ marginTop: "1rem" }}>
    <div style={{ fontSize: ".75rem", fontWeight: 700, color: "var(--text)", marginBottom: ".65rem", textTransform: "uppercase", letterSpacing: ".06em" }}>📊 Comparativa de tecnologías de control</div>
    <div className="ctrl-grid">
      {Object.values(opts).map(o => <div key={o.name} className={`ctrl-card ${o.recommended ? "recommended" : ""}`}>
        <div className="ctrl-title">
          {o.recommended ? "⭐" : o.suitable ? "✓" : "✗"}
          <span style={{ color: o.recommended ? "var(--accent-dark)" : o.suitable ? "var(--green)" : "var(--text3)" }}>{o.name}</span>
        </div>
        {o.suitable ? <>
          <div style={{ fontSize: ".75rem", marginBottom: ".35rem" }}><span className="tag tag-amber">{o.model}</span></div>
          <div style={{ fontSize: ".72rem", color: "var(--text2)", marginBottom: ".25rem" }}>CAPEX est: <span style={{ fontFamily: "var(--mono)", fontWeight: 700 }}>${fmt(o.cost_est)}</span></div>
          <div className="pros-cons">
            {o.pros.map((p, i) => <div key={i} className="pro">✓ {p}</div>)}
            {o.cons.map((c, i) => <div key={i} className="con">✗ {c}</div>)}
          </div>
        </> : <div style={{ fontSize: ".78rem", color: "var(--text3)", marginTop: ".35rem" }}>No recomendado para este proyecto por las características del sistema.</div>}
      </div>)}
    </div>
    {conclusionText && <div className="alert alert-info" style={{ marginTop: ".85rem" }}>
      💡 <strong>Conclusión técnica — {recommended?.name} ({recommended?.model}):</strong> {conclusionText}
    </div>}
  </div>;
}

// ── CHARTS COMPONENTS ─────────────────────────────────────────────────────────
function SolarCharts({ summary, theme }) {
  const genRef = useRef(null);
  const paybackRef = useRef(null);
  const capexRef = useRef(null);
  const chartsRef = useRef({});

  const MONTHS = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const HSP_MONTHLY_FACTOR = [0.88,0.92,1.02,1.05,1.03,0.97,1.00,1.02,1.00,0.96,0.90,0.85];

  useEffect(() => {
    if (!summary) return;
    const kwpInst = parseFloat(summary.kwp_inst);
    const hsp = parseFloat(summary.hsp);
    const capex = parseFloat(summary.capex);
    const ahAno = parseFloat(summary.ah_ano);
    const payback = parseFloat(summary.payback);
    const cd = summary.capex_detail || {};
    const isDark = theme === "dark";
    const gridColor = isDark ? "rgba(255,255,255,.07)" : "rgba(0,0,0,.06)";
    const textColor = isDark ? "#8b949e" : "#64748b";
    const accentColor = "#f59e0b";

    // Destroy existing charts
    Object.values(chartsRef.current).forEach(c => { try { c.destroy(); } catch(e){} });
    chartsRef.current = {};

    // Chart 1: Monthly generation
    if (genRef.current) {
      const ploss = parseFloat(summary.inputs?.perdidas_manual) || (summary.inputs?.tipo_sistema === "on-grid" ? 0.18 : 0.22);
      const genData = MONTHS.map((m, i) => +(kwpInst * hsp * HSP_MONTHLY_FACTOR[i] * 30 * (1 - ploss)).toFixed(0));
      const consumo = Array(12).fill(+(parseFloat(summary.inputs?.consumo_mensual_kwh || 150)));
      chartsRef.current.gen = new Chart(genRef.current, {
        type: "bar",
        data: {
          labels: MONTHS,
          datasets: [
            { label: "Generación solar (kWh)", data: genData, backgroundColor: "rgba(245,158,11,.75)", borderColor: accentColor, borderWidth: 1, borderRadius: 4 },
            { label: "Consumo (kWh)", data: consumo, type: "line", borderColor: "#3b82f6", backgroundColor: "rgba(59,130,246,.12)", borderWidth: 2, pointRadius: 3, tension: 0.4, fill: true }
          ]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: textColor, font: { size: 11 } } } }, scales: { x: { ticks: { color: textColor, font: { size: 10 } }, grid: { color: gridColor } }, y: { ticks: { color: textColor, font: { size: 10 } }, grid: { color: gridColor }, title: { display: true, text: "kWh/mes", color: textColor, font: { size: 10 } } } } }
      });
    }

    // Chart 2: Payback / Cash flow acumulado (con degradación y escalada de tarifa)
    if (paybackRef.current) {
      const years = Array.from({length:16},(_,i)=>i);
      const kwh_anual = parseFloat(summary.inputs?.consumo_mensual_kwh || 150) * 12 * parseFloat(summary.inputs?.porcentaje_cobertura || 1);
      const tarifa = parseFloat(summary.inputs?.precio_kwh_cop || 800);
      const cashflow = years.map(y => {
        if (y === 0) return Math.round(-capex);
        let acum = -capex;
        for (let i = 1; i <= y; i++) {
          const deg = Math.pow(1 - 0.005, i);
          const esc = Math.pow(1.08, i);
          acum += kwh_anual * deg * tarifa * esc;
        }
        return Math.round(acum);
      });
      const colors = cashflow.map(v => v >= 0 ? "rgba(5,150,105,.75)" : "rgba(220,38,38,.65)");
      chartsRef.current.pb = new Chart(paybackRef.current, {
        type: "bar",
        data: {
          labels: years.map(y => `Año ${y}`),
          datasets: [
            { label: "Flujo acumulado COP (tarifa +8%/a, degradación 0.5%/a)", data: cashflow, backgroundColor: colors, borderRadius: 3 },
            { label: "Break-even", data: Array(16).fill(0), type: "line", borderColor: "#f59e0b", borderWidth: 2, borderDash: [5,3], pointRadius: 0 }
          ]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: textColor, font: { size: 11 } } } }, scales: { x: { ticks: { color: textColor, font: { size: 9 }, maxRotation: 45 }, grid: { color: gridColor } }, y: { ticks: { color: textColor, font: { size: 10 }, callback: v => v>=1e6?`${(v/1e6).toFixed(1)}M`:v>=1e3?`${(v/1e3).toFixed(0)}k`:v }, grid: { color: gridColor } } } }
      });
    }

    // Chart 3: CAPEX breakdown donut — usa nueva estructura capex_detail
    if (capexRef.current) {
      const topoLabel = (summary.topo === "hybrid") ? "Inv. Híbrido" : (summary.topo === "ongrid") ? "Inv. On-Grid" : (summary.topo === "mppt_pure") ? "MPPT+Inversor" : "PWM+Inversor";
      const items = Object.entries({
        "Paneles": cd.paneles||0,
        [topoLabel]: cd.equipo_control||0,
        "Baterías": cd.baterias||0,
        "Estructura": cd.estructura||0,
        "Cables/otros": cd.otros||0,
        "Mano de obra": cd.mano_obra||0
      }).filter(([,v])=>v>0);
      chartsRef.current.capex = new Chart(capexRef.current, {
        type: "doughnut",
        data: {
          labels: items.map(([k])=>k),
          datasets: [{ data: items.map(([,v])=>v), backgroundColor: ["#f59e0b","#3b82f6","#8b5cf6","#10b981","#f97316","#64748b","#ec4899"], borderWidth: 2, borderColor: isDark?"#161b22":"#fff" }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: "right", labels: { color: textColor, font: { size: 10 }, boxWidth: 12 } }, tooltip: { callbacks: { label: ctx => ` ${ctx.label}: $${fmt(ctx.raw)} (${((ctx.raw/capex)*100).toFixed(1)}%)` } } } }
      });
    }

    return () => { Object.values(chartsRef.current).forEach(c => { try { c.destroy(); } catch(e){} }); };
  }, [summary, theme]);

  return <div>
    <div className="card">
      <div className="card-hdr"><span className="card-title">☀️ Curva de generación mensual vs consumo</span></div>
      <div className="chart-container"><canvas ref={genRef} /></div>
    </div>
    <div className="chart-grid">
      <div className="card">
        <div className="card-hdr"><span className="card-title">📈 Flujo de caja acumulado (15 años)</span></div>
        <div className="chart-container" style={{height:220}}><canvas ref={paybackRef} /></div>
      </div>
      <div className="card">
        <div className="card-hdr"><span className="card-title">🥧 Distribución CAPEX</span></div>
        <div className="chart-container" style={{height:220}}><canvas ref={capexRef} /></div>
      </div>
    </div>
  </div>;
}

            <td className="mono" style={{ fontSize: ".72rem", color: "var(--text3)" }}>
              {item.type === "panel" && `${item.wp}Wp | Voc=${item.voc}V | Vmp=${item.vmp}V | Imp=${item.imp}A`}
              {item.type === "mppt" && `${item.max_pv_voltage}V | ${item.max_charge_current}A`}
              {item.type === "battery" && `${item.kwh}kWh | ${item.chemistry} | DoD=${item.dod} | ${item.cycles} ciclos`}
              {item.type === "inverter" && `${item.kw}kW | ${item.voltage}V${item.mppt_included ? " | MPPT integrado" : ""}`}
              {item.type === "structure" && `${item.quantity_panels || "—"} paneles`}
            </td>
            <td className="mono">${fmt(item.price)}</td>
            <td className="mono">{item.stock}</td>
            <td><div style={{ display: "flex", gap: ".25rem" }}>
              <button className="btn btn-ghost" style={{ padding: ".25rem .45rem", fontSize: ".7rem" }} onClick={() => { setEditing(item); setForm({ ...item }); setShowForm(true); }}>✏️</button>
              <button className="btn btn-danger" style={{ padding: ".25rem .45rem", fontSize: ".7rem" }} onClick={() => setCatalog(c => c.filter(i => i.id !== item.id))}>🗑</button>
            </div></td>
          </tr>)}
        </tbody>
      </table>
    </div>
  </div>;
}

function PicosArranqueView({ onApplyPeak }) {
  const [cat, setCat] = React.useState(STARTUP_CATALOG[0].cat);
  const [selItem, setSelItem] = React.useState(STARTUP_CATALOG[0].items[0]);
  const [equipos, setEquipos] = React.useState([
    { id:1, name:"Aire acond. 12000 BTU (inverter)", watts:1200, qty:1, type:"Aire acondicionado (inverter)" },
    { id:2, name:"Bomba agua 1 HP sumergible",        watts:750,  qty:1, type:"Bomba de agua sumergible" },
    { id:3, name:"Nevera/Refrigerador 200L",           watts:150,  qty:1, type:"Nevera / Refrigerador" },
  ]);

  const changeCat = (c) => {
    const found = STARTUP_CATALOG.find(x=>x.cat===c);
    setCat(c);
    setSelItem(found.items[0]);
  };
  const changeItem = (n) => {
    const items = (STARTUP_CATALOG.find(x=>x.cat===cat)||{items:[]}).items;
    const found = items.find(i=>i.n===n);
    if(found) setSelItem(found);
  };
  const addFromCat = () => setEquipos(prev=>[...prev,{id:Date.now(),name:selItem.n,watts:selItem.w,qty:1,type:selItem.type}]);
  const addCustom = () => setEquipos(prev=>[...prev,{id:Date.now(),name:"Equipo personalizado",watts:500,qty:1,type:"Motor resistivo / Calefacción"}]);
  const upd = (id,f,v) => setEquipos(prev=>prev.map(e=>e.id!==id?e:{...e,[f]:["watts","qty"].includes(f)?parseFloat(v)||0:v}));
  const del = (id) => setEquipos(prev=>prev.filter(e=>e.id!==id));

  const rows = equipos.map(e=>{
    const factor = STARTUP_FACTORS[e.type] || 1.5;
    const wNom = e.watts * e.qty;
    const wPeak = wNom * factor;
    return { ...e, factor, wNom, wPeak };
  });
  const totalNom  = rows.reduce((s,r)=>s+r.wNom,0);
  const totalPeak = rows.reduce((s,r)=>s+r.wPeak,0);
  const invReq_kw = (totalPeak/1000).toFixed(2);
  const invReqCeil = Math.ceil(totalPeak/1000 / 0.5) * 0.5; // redondeo a 0.5kW
  const riskLevel = invReqCeil <= 3 ? "bajo" : invReqCeil <= 6 ? "medio" : "alto";
  const riskColor = riskLevel==="bajo"?"var(--green)":riskLevel==="medio"?"var(--accent)":"var(--red)";

  return (
    <div className="consumo-view">
      {/* Hero */}
      <div className="consumo-hero" style={{background:"linear-gradient(135deg,#6d1b7b 0%,#4a1259 60%,#2d0b3b 100%)"}}>
        <div className="consumo-hero-text">
          <h2>⚡ Calculadora de Picos de Arranque</h2>
          <p>Descubra la potencia <strong>real de arranque</strong> de sus equipos. Muchos inversores se apagan por dimensionarse solo con potencia nominal — esta calculadora revela el pico oculto.</p>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontFamily:"var(--mono)",fontSize:"1.8rem",fontWeight:800,color:"#ff6b6b"}}>{invReq_kw}</div>
          <div style={{fontSize:".78rem",color:"rgba(255,255,255,.75)"}}>kW pico arranque</div>
        </div>
      </div>

      {/* KPIs */}
      <div className="consumo-kpi-row">
        {[
          {v:`${(totalNom/1000).toFixed(2)}`,  u:"kW", l:"Potencia nominal total",  c:"var(--blue)"},
          {v:`${invReq_kw}`,                    u:"kW", l:"Pico arranque máximo",    c:"var(--red)"},
          {v:`${invReqCeil}`,                   u:"kW", l:"Inversor mínimo recomendado", c:riskColor},
          {v:`${riskLevel.toUpperCase()}`,      u:"",   l:"Nivel de riesgo",         c:riskColor},
        ].map((k,i)=>(
          <div key={i} className="consumo-kpi">
            <div className="consumo-kpi-val" style={{color:k.c,fontSize:"1.3rem"}}>{k.v}</div>
            {k.u && <div className="consumo-kpi-unit">{k.u}</div>}
            <div className="consumo-kpi-lbl">{k.l}</div>
          </div>
        ))}
      </div>

      {/* Alerta principal */}
      {equipos.length > 0 && (
        <div style={{background:"var(--red-light)",border:`2px solid var(--red)`,borderRadius:"var(--radius)",padding:"1rem 1.25rem",marginBottom:"1rem",display:"flex",alignItems:"center",gap:"1rem"}}>
          <div style={{fontSize:"2rem",flexShrink:0}}>⛔</div>
          <div>
            <div style={{fontWeight:700,fontSize:".95rem",color:"var(--red)",marginBottom:".25rem"}}>
              Cualquier inversor menor a <span style={{fontSize:"1.2rem",fontFamily:"var(--mono)"}}>{invReqCeil} kW</span> se va a apagar si enciende todo esto al mismo tiempo
            </div>
            <div style={{fontSize:".78rem",color:"var(--text2)"}}>
              Potencia nominal total: <strong>{(totalNom/1000).toFixed(2)} kW</strong> — pero el pico real de arranque sube a <strong style={{color:"var(--red)"}}>{invReq_kw} kW</strong> por los multiplicadores técnicos de cada equipo.
            </div>
          </div>
        </div>
      )}

// Hazen-Williams friction loss calculator
function frictionLossHW(Q_m3h, D_mm, L_m, C=120) {
  if (!Q_m3h || !D_mm || !L_m) return 0;
  const D_m = D_mm / 1000;
  const Q_m3s = Q_m3h / 3600;
  const V = Q_m3s / (Math.PI * Math.pow(D_m/2, 2)); // m/s
  // Hazen-Williams: hf = 10.67 * L * Q^1.852 / (C^1.852 * D^4.87)
  const hf = 10.67 * L_m * Math.pow(Q_m3h/3600, 1.852) / (Math.pow(C/100, 1.852) * Math.pow(D_m, 4.87));
  return isNaN(hf) ? 0 : hf;
}

// Find operating point: intersection of system curve with pump curve
function findOperatingPoint(pump, hdt_static, Q_design) {
  // System curve: H_sys = HDT_static + k*Q^2 (resistive losses)
  // k calculated so that at Q_design the total matches HDT
  const k = Q_design > 0 ? 1.0 : 0; // simplified — HDT already includes friction
  const curve = pump.curve;
  let best = null, bestDist = Infinity;
  for (let i = 0; i < curve.length - 1; i++) {
    const [q1, h1] = curve[i], [q2, h2] = curve[i+1];
    // Pump curve linear segment
    // Find Q where pump_H = hdt_static + losses (already in HDT)
    // Simplified: find pump H at Q_design
    if (Q_design >= q1 && Q_design <= q2) {
      const frac = (Q_design - q1) / (q2 - q1);
      const h_pump = h1 + frac * (h2 - h1);
      best = { q: Q_design, h_pump, margin: h_pump - hdt_static };
      break;
    }
  }
  if (!best && curve.length > 0) {
    // Extrapolate last segment
    const [q1,h1] = curve[curve.length-2], [q2,h2] = curve[curve.length-1];
    if (Q_design > q2) { best = { q:Q_design, h_pump:Math.max(0,h2), margin:h2-hdt_static }; }
    else { best = { q:Q_design, h_pump:h1, margin:h1-hdt_static }; }
  }
  return best;
}

// Canvas-based H-Q curve chart
function PumpCurveChart({ pump, Q_design, HDT, theme }) {
  const canvasRef = React.useRef(null);
  React.useEffect(() => {
    if (!pump || !canvasRef.current) return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    const W = canvas.width = canvas.offsetWidth * window.devicePixelRatio;
    const H = canvas.height = 220 * window.devicePixelRatio;
    canvas.style.height = "220px";
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    const w = canvas.offsetWidth, h = 220;
    const pad = { l:52, r:20, t:16, b:44 };
    const plotW = w - pad.l - pad.r, plotH = h - pad.t - pad.b;

    const isDark = theme === "dark";
    const bg  = isDark ? "#161b22" : "#ffffff";
    const grid= isDark ? "rgba(255,255,255,.06)" : "rgba(0,0,0,.06)";
    const text= isDark ? "#8b949e" : "#64748b";
    const blue= "#3b82f6";
    const orange="#f59e0b";
    const red  = "#dc2626";
    const green= "#10b981";

    ctx.fillStyle = bg; ctx.fillRect(0,0,w,h);

    const maxQ = pump.curve[pump.curve.length-1][0] * 1.15;
    const maxH = pump.curve[0][1] * 1.20;

    const toX = q => pad.l + (q/maxQ)*plotW;
    const toY = hh => pad.t + plotH - (hh/maxH)*plotH;

    // Grid
    ctx.strokeStyle = grid; ctx.lineWidth = 0.5;
    for (let i=0;i<=5;i++) {
      const x = pad.l + (i/5)*plotW;
      ctx.beginPath(); ctx.moveTo(x, pad.t); ctx.lineTo(x, pad.t+plotH); ctx.stroke();
      ctx.fillStyle=text; ctx.font="10px sans-serif"; ctx.textAlign="center";
      ctx.fillText((maxQ*i/5).toFixed(1), x, pad.t+plotH+14);
    }
    for (let i=0;i<=4;i++) {
      const y = pad.t + (i/4)*plotH;
      ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l+plotW, y); ctx.stroke();
      ctx.fillStyle=text; ctx.font="10px sans-serif"; ctx.textAlign="right";
      ctx.fillText(Math.round(maxH*(1-i/4)), pad.l-6, y+3);
    }

    // Axis labels
    ctx.fillStyle=text; ctx.font="11px sans-serif"; ctx.textAlign="center";
    ctx.fillText("Caudal Q (m³/h)", pad.l+plotW/2, h-4);
    ctx.save(); ctx.translate(14, pad.t+plotH/2); ctx.rotate(-Math.PI/2);
    ctx.fillText("Altura H (m)", 0, 0); ctx.restore();

    // Pump H-Q curve (blue)
    ctx.beginPath(); ctx.strokeStyle=blue; ctx.lineWidth=2.5;
    pump.curve.forEach(([q,hh],i) => { i===0?ctx.moveTo(toX(q),toY(hh)):ctx.lineTo(toX(q),toY(hh)); });
    ctx.stroke();

    // BEP point (green circle)
    const bx=toX(pump.bep.q), by=toY(pump.bep.h);
    ctx.beginPath(); ctx.arc(bx,by,7,0,Math.PI*2);
    ctx.fillStyle=green+"44"; ctx.fill();
    ctx.strokeStyle=green; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle=green; ctx.font="10px sans-serif"; ctx.textAlign="left";
    ctx.fillText(`BEP η=${Math.round(pump.bep.eta*100)}%`, bx+10, by-4);

    // System operating point (if Q_design > 0)
    if (Q_design > 0 && HDT > 0) {
      const op = findOperatingPoint(pump, HDT, Q_design);
      if (op) {
        const ox=toX(op.q), oy=toY(HDT);
        // HDT horizontal line (orange dashed)
        ctx.setLineDash([5,3]); ctx.strokeStyle=orange; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.moveTo(pad.l,oy); ctx.lineTo(toX(maxQ),oy); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle=orange; ctx.font="10px sans-serif"; ctx.textAlign="left";
        ctx.fillText(`HDT=${HDT}m`, pad.l+4, oy-5);
        // Vertical line at Q_design
        ctx.setLineDash([5,3]); ctx.strokeStyle=red; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.moveTo(ox,pad.t); ctx.lineTo(ox,pad.t+plotH); ctx.stroke();
        ctx.setLineDash([]);
        // Operating point dot
        ctx.beginPath(); ctx.arc(ox,oy,6,0,Math.PI*2);
        ctx.fillStyle=red+"44"; ctx.fill();
        ctx.strokeStyle=red; ctx.lineWidth=2.5; ctx.stroke();
        // Labels
        ctx.fillStyle=text; ctx.font="10px sans-serif"; ctx.textAlign="center";
        ctx.fillText(`Q=${Q_design}m³/h`, ox, pad.t+plotH+28);
        // Margin indicator
        if (op.margin > 0) {
          ctx.fillStyle=green; ctx.textAlign="right";
          ctx.fillText(`H_bomba=${op.h_pump.toFixed(0)}m (+${op.margin.toFixed(0)}m margen)`, w-pad.r-4, oy-12);
        } else {
          ctx.fillStyle=red; ctx.textAlign="right";
          ctx.fillText(`⚠ Insuficiente: H_bomba=${op.h_pump.toFixed(0)}m < HDT`, w-pad.r-4, oy-12);
        }
      }
    }

    // Legend
    const lx=pad.l+4, ly=pad.t+8;
    [[blue,"Curva H-Q"],[green,"BEP"],[orange,"HDT diseño"],[red,"Punto operación"]].forEach(([c,l],i)=>{
      ctx.fillStyle=c; ctx.fillRect(lx+(i%2)*120, ly+Math.floor(i/2)*16, 12, 3);
      ctx.fillStyle=text; ctx.font="10px sans-serif"; ctx.textAlign="left";
      ctx.fillText(l, lx+16+(i%2)*120, ly+6+Math.floor(i/2)*16);
    });
  }, [pump, Q_design, HDT, theme]);

  return <canvas ref={canvasRef} style={{width:"100%",height:"220px",display:"block"}} />;
}

function BombeoSolarView({ onApply }) {
  const [tab, setTab] = React.useState("parametros");
  const [form, setForm] = React.useState({
    nombre: "", cliente: "", region: "Sincelejo",
    Q: 5, H_estatica: 30, H_dinamica: 0, D_mm: 63, L_m: 50,
    horas: 6, hsp: 5.3, fs: 1.20,
    tipo_bomba: "todos", tipo_acc: "vfd_ac", conTanque: true,
    autonomia_dias: 1.5,
    selected_pump_id: "",
  });
  const [results, setResults] = React.useState(null);
  const [theme, setThemeB] = React.useState(() =>
    document.documentElement.getAttribute("data-theme") || "dark"
  );

  // Sync theme
  React.useEffect(() => {
    const obs = new MutationObserver(() =>
      setThemeB(document.documentElement.getAttribute("data-theme") || "dark")
    );
    obs.observe(document.documentElement, {attributes:true,attributeFilter:["data-theme"]});
    return ()=>obs.disconnect();
  }, []);

  const sf = (k,v) => setForm(f=>({...f,[k]:v}));

  // Filter pumps by type
  const pumpsByType = React.useMemo(() => {
    const t = form.tipo_bomba;
    return t === "todos" ? PUMP_CATALOG : PUMP_CATALOG.filter(p => p.type === t);
  }, [form.tipo_bomba]);

  const selectedPump = React.useMemo(() =>
    PUMP_CATALOG.find(p=>p.id===form.selected_pump_id) || null, [form.selected_pump_id]);

  // MAIN CALCULATION
  const calculate = () => {
    const Q = parseFloat(form.Q)||0;
    const H_est = parseFloat(form.H_estatica)||0;
    const H_din_manual = parseFloat(form.H_dinamica)||0;
    const D = parseFloat(form.D_mm)||63;
    const L = parseFloat(form.L_m)||50;
    const h_bomb = parseFloat(form.horas)||6;
    const hsp_bruto = parseFloat(form.hsp)||5.3;
    const fs = parseFloat(form.fs)||1.20;
    const conTanque = form.conTanque;
    const auto_dias = parseFloat(form.autonomia_dias)||1.5;

    // Friction losses
    const hf = H_din_manual > 0 ? H_din_manual : frictionLossHW(Q, D, L);
    const h_presion_residual = 5; // m — presión mínima en descarga
    const HDT = H_est + hf + h_presion_residual;

    // Pump efficiencies — use selected pump's real BEP efficiency if available
    const eta_bomba_map = { sumergible_dc:0.72, centrifuga_ac:0.64, sumergible_ac:0.70, periferica:0.52, todos:0.68 };
    const eta_acc_map   = { directo_dc:0.97, vfd_ac:0.91, ac_directo:0.85 };
    const eta_b = selectedPump ? selectedPump.bep.eta : (eta_bomba_map[form.tipo_bomba] || 0.68);
    const eta_a = eta_acc_map[form.tipo_acc] || 0.91;
    const eta_cableado = 0.97;

    // Power chain
    const P_hid  = (1000 * 9.81 * Q * HDT) / 3600; // W
    const P_bomba = P_hid / eta_b;
    const P_elec  = P_bomba / (eta_a * eta_cableado);

    // Solar sizing
    const hsp_ef = hsp_bruto * 0.90;
    const kwp = (P_elec / 1000 * fs) / hsp_ef;

    // Volumes
    const vol_dia = Q * h_bomb;
    const vol_tanque = conTanque ? vol_dia * auto_dias : 0;

    // Panel count
    const n_550 = Math.ceil(kwp*1000/550);
    const n_730 = Math.ceil(kwp*1000/730);

    // Equivalent monthly kWh (for solar calc integration)
    const kwh_mes = P_elec/1000 * h_bomb * 30;

    // Economics
    const costo_panel = n_550 * 348480;
    const costo_bomba = selectedPump ? selectedPump.price : (form.tipo_bomba==="sumergible_dc"?3500000:form.tipo_bomba==="sumergible_ac"?1800000:800000);
    const costo_vfd = (form.tipo_acc==="vfd_ac") ? Math.ceil(P_elec/1000)*300000 : 0;
    const costo_tanque = conTanque ? Math.ceil(vol_tanque) * 180000 : 0; // COP/m³ tanque plástico
    const costo_inst = (costo_panel + costo_bomba + costo_vfd) * 0.20;
    const costo_total = costo_panel + costo_bomba + costo_vfd + costo_tanque + costo_inst;

    // Pump curve validation
    let pump_ok = null, pump_margin = null;
    if (selectedPump) {
      const op = findOperatingPoint(selectedPump, HDT, Q);
      pump_ok = op && op.margin >= 0;
      pump_margin = op ? op.margin : null;
    }

    setResults({
      Q, H_est, hf, HDT, P_hid, P_bomba, P_elec, eta_b, eta_a,
      hsp_ef, kwp, vol_dia, vol_tanque, n_550, n_730, kwh_mes,
      costo_total, costo_panel, costo_bomba, costo_vfd, costo_tanque, costo_inst,
      pump_ok, pump_margin, h_bomb, hsp_bruto, fs, conTanque,
    });
    setTab("resultados");
  };

  const fmtM = v => v>=1e6?`$${(v/1e6).toFixed(2)}M`:`$${Math.round(v/1000)}k`;
  const fmt = v => Math.round(v).toLocaleString("es-CO");

  return (
    <div className="consumo-view">
      {/* Hero */}
      <div className="consumo-hero" style={{background:"linear-gradient(135deg,#0c4a6e 0%,#075985 50%,#0369a1 100%)"}}>
        <div className="consumo-hero-text">
          <h2>💧 Módulo de Bombeo Solar Fotovoltaico</h2>
          <p>Dimensionamiento hidráulico y fotovoltaico profesional. Selección de bomba con curva H-Q, cálculo de HDT, análisis de punto de operación y generación de cotización completa.</p>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontFamily:"var(--mono)",fontSize:"1.8rem",fontWeight:800,color:"#7dd3fc"}}>
            {results ? results.kwp.toFixed(2) : "—"}
          </div>
          <div style={{fontSize:".78rem",color:"rgba(255,255,255,.7)"}}>kWp requerido</div>
        </div>
      </div>

      {/* Tabs */}
      <div className="tabs" style={{flexWrap:"wrap",marginBottom:"1rem"}}>
        {[
          {id:"parametros",l:"⚙️ Parámetros hidráulicos"},
          {id:"bomba",l:"🔧 Selección de bomba"},
          {id:"resultados",l:"📊 Resultados"},
          {id:"curva",l:"📈 Curva H-Q"},
          {id:"cotizacion",l:"💰 Cotización"},
        ].map(t=>(
          <button key={t.id} className={`tab ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}>{t.l}</button>
        ))}
      </div>

      {/* ── TAB: PARÁMETROS ───────────────────────────────────────────── */}
      {tab==="parametros" && <div>
        <div className="card" style={{marginBottom:".75rem"}}>
          <div className="card-hdr"><span className="card-title">📋 Identificación del proyecto</span></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".75rem",padding:".25rem 0"}}>
            <div className="field"><div className="field-lbl">Nombre del proyecto</div>
              <input type="text" value={form.nombre} onChange={e=>sf("nombre",e.target.value)} placeholder="ej. Bombeo Finca La Esperanza" /></div>
            <div className="field">
              <div className="field-lbl">Ciudad / Región
                <BT title="Ciudad o municipio del proyecto">
                  Se usa para obtener el <strong>HSP (Horas Solar Pico)</strong> de la zona automáticamente desde la tabla interna. También puede ingresar el HSP manualmente abajo.
                  <span className="tip-example">Ejemplos: Sincelejo, Montería, Villavicencio, Barranquilla</span>
                </BT>
              </div>
              <input type="text" value={form.region} onChange={e=>sf("region",e.target.value)} placeholder="ej. Montería" /></div>

                <BT title="Diámetro nominal — afecta directamente las pérdidas por fricción">
                  Mayor diámetro = menos fricción = menor HDT = menos paneles. Es una decisión económica: el costo de una tubería más gruesa se recupera con menos paneles.

                <BT title="Horas Solar Pico — recurso solar disponible">
                  Las Horas Solar Pico representan cuántas horas equivalentes de sol a 1000 W/m² recibe la zona al día. Es el parámetro más crítico del dimensionamiento solar.
                  <span className="tip-formula">kWp = P_elec / HSP_efectivo</span>
                  <strong>Valores Colombia:</strong><br/>
                  • Barranquilla / Riohacha: 5.5–5.7 h<br/>
                  • Sincelejo / Montería: 5.3–5.4 h<br/>
                  • Cali / Medellín: 4.7–5.2 h<br/>

                  <span className="tip-example">Fuente precisa: pvgis.ec.europa.eu con las coordenadas exactas del proyecto</span>

              </div>
              <input type="number" value={form.hsp} min="2" max="8" step="0.1" onChange={e=>sf("hsp",e.target.value)} />

            </div>

            <div className="field">
              <div className="field-lbl">Factor de seguridad (FS)
                <BT title="Factor de seguridad — margen de diseño">
                  El FS amplifica el kWp calculado para cubrir incertidumbres: variaciones estacionales de HSP, suciedad en paneles, envejecimiento, mediciones imprecisas de HDT.
                  <span className="tip-formula">kWp_diseño = kWp_calculado × FS</span>
                  <strong>Valores recomendados:</strong><br/>
                  • 1.15: datos precisos, zona sin nubes<br/>
                  • 1.20: <strong>estándar recomendado</strong> para Colombia<br/>

              </div>
              <input type="number" value={form.fs} min="1.1" max="1.5" step="0.05" onChange={e=>sf("fs",e.target.value)} />
