            </div>

          </div>
        </div>

        <div className="card" style={{marginBottom:".75rem"}}>
          <div className="card-hdr"><span className="card-title">⚡ Sistema de accionamiento y almacenamiento</span></div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:".85rem",padding:".25rem 0"}}>

            <div className="field">
              <div className="field-lbl">Tipo de bomba
                <BT title="Tipo de bomba — define la arquitectura del sistema">
                  <strong>Sumergible DC Solar:</strong> la más eficiente. Va dentro del pozo. Se conecta directamente a los paneles sin inversor. η=70–75%.<br/><br/>
                  <strong>Sumergible AC:</strong> más económica. Requiere inversor/VFD para funcionar con solar. η=68–72%.<br/><br/>
                  <strong>Centrífuga AC:</strong> de superficie (no va dentro del pozo). Para ríos, lagos, quebradas. Requiere VFD. η=60–68%.<br/><br/>
                  <strong>Periférica:</strong> la más pequeña y económica. Solo para bajos caudales y presiones. η=50–58%.
                  <span className="tip-example">Regla: si tiene pozo → sumergible. Si tiene fuente superficial → centrífuga.</span>
                </BT>
              </div>
              <select value={form.tipo_bomba} onChange={e=>{sf("tipo_bomba",e.target.value);sf("selected_pump_id","");}}>
                <option value="todos">Ver todos los tipos</option>
                <option value="sumergible_dc">Sumergible DC Solar (η≈72%, sin inversor)</option>
                <option value="sumergible_ac">Sumergible AC (η≈70%, requiere VFD)</option>
                <option value="centrifuga_ac">Centrífuga AC (η≈64%, superficie, requiere VFD)</option>
                <option value="periferica">Periférica / Superficie (η≈52%, pequeños sistemas)</option>
              </select>
            </div>

            <div className="field">
              <div className="field-lbl">Tipo de accionamiento
                <BT title="Accionamiento — cómo se convierte la energía solar en movimiento de la bomba">
                  <strong>DC directo (η=97%):</strong> los paneles alimentan directamente el motor DC de la bomba. El más eficiente. Solo para bombas DC especiales. Sin inversor = menos pérdidas y mayor confiabilidad.<br/><br/>
                  <strong>AC con VFD (η=91%):</strong> un variador de frecuencia convierte DC→AC y regula la velocidad según la irradiancia. Arranque suave que protege el motor. Para bombas AC estándar.<br/><br/>
                  <strong>AC sin variador (η=85%):</strong> el inversor entrega 220V/60Hz directamente. Arranque brusco que puede dañar el motor. No recomendado para sistemas > 500W.
                  <span className="tip-example">⚠ El VFD protege el motor del arranque con baja tensión solar. Sin VFD, el motor puede quemarse en horas.</span>
                </BT>

                <option value="vfd_ac">AC con variador VFD — DC → AC controlado (η=91%, recomendado)</option>
                <option value="ac_directo">AC sin variador — inversor estándar (η=85%, riesgo motor)</option>

                  <strong>Con tanque (RECOMENDADO):</strong><br/>
                  El agua almacenada es la "batería" del sistema. Se bombea durante el día y se consume las 24 horas. Un m³ de tanque plástico (~$180k COP) dura 20 años. Es 10× más barato que una batería equivalente.<br/><br/>
                  <strong>Sin tanque (requiere baterías):</strong><br/>

                </BT>

        <div className="card" style={{marginBottom:".75rem"}}>
          <div className="card-hdr"><span className="card-title">📐 Cadena de cálculo completa</span></div>
          <div className="formula-block" style={{whiteSpace:"pre-wrap",fontSize:".78rem",lineHeight:1.9}}>{`PASO 1 — Altura Dinámica Total (HDT)
─────────────────────────────────────────────────────────
  ¿Por qué HDT?: La bomba debe vencer TODA la resistencia al flujo, no
  solo la diferencia de nivel. La fricción y la presión residual consumen
  energía adicional que si se ignoran llevan a elegir una bomba insuficiente.

  H_estática             = ${results.H_est.toFixed(1)} m
    └─ Diferencia de nivel geométrica (GPS o cinta + nivel)

  Pérdidas fricción (HW) = ${results.hf.toFixed(2)} m
    └─ Fórmula Hazen-Williams: hf = 10.67×L×Q^1.852 / (C^1.852×D^4.87)
       L=${form.L_m}m · D=${form.D_mm}mm · Q=${results.Q}m³/h · C=120 (PVC nuevo)

  Presión residual descarga = 5.00 m
    └─ Presión mínima recomendada en el punto de entrega (≈0.5 bar)
       Para goteo: 8–15m · Para aspersión: 15–30m

  HDT total = ${results.HDT.toFixed(2)} m
    └─ Este es el valor que debe estar BAJO la curva H-Q de la bomba
       en el punto de operación Q=${results.Q}m³/h

PASO 2 — Potencia hidráulica (energía pura del fluido)
─────────────────────────────────────────────────────────
  ¿Por qué esta fórmula?: Es la energía que el agua REALMENTE necesita
  para moverse. Proviene de la mecánica de fluidos: potencia = fuerza × velocidad.

  P_hid = ρ × g × Q × HDT / 3600
        = 1000 [kg/m³] × 9.81 [m/s²] × ${results.Q} [m³/h] × ${results.HDT.toFixed(2)} [m] / 3600
        = ${results.P_hid.toFixed(1)} W
    ├─ ρ=1000 kg/m³: densidad del agua a 20°C
    ├─ g=9.81 m/s²: aceleración gravitacional
    ├─ /3600: convierte m³/h → m³/s (unidades SI)
    └─ Resultado: potencia mínima IDEAL sin pérdidas mecánicas

PASO 3 — Potencia en el eje de la bomba (mecánica real)
─────────────────────────────────────────────────────────
  ¿Por qué dividir?: Ninguna bomba es perfecta. La eficiencia hidráulica
  (η_bomba) representa cuánto de la potencia mecánica del eje se convierte
  en energía útil del fluido. El resto se pierde en turbulencias, fricciones
  internas y calor. Un η=70% significa que el 30% se "desperdicia".

  P_bomba = P_hid / η_bomba
          = ${results.P_hid.toFixed(1)} / ${results.eta_b.toFixed(2)} ${selectedPump?"(η real BEP "+selectedPump.name+")":"(valor típico tipo seleccionado)"}
          = ${results.P_bomba.toFixed(1)} W
    └─ η=${results.eta_b.toFixed(2)} (${Math.round(results.eta_b*100)}%) = eficiencia en el Punto de Máxima Eficiencia (BEP)
       ⚠ Si la bomba opera fuera del BEP, η puede bajar al 40–50%
       ⚠ Por eso es CRÍTICO verificar que Q,H de diseño estén cerca del BEP

PASO 4 — Potencia eléctrica total (lo que el panel debe generar)
─────────────────────────────────────────────────────────
  ¿Por qué otro divisor?: El VFD/inversor y el cableado también tienen pérdidas.
  La cadena de conversión es: Luz solar → Panel → VFD → Motor → Bomba → Agua.
  Cada eslabón tiene su eficiencia. Hay que sumar todas las pérdidas.

  P_elec = P_bomba / (η_accionamiento × η_cableado)
         = ${results.P_bomba.toFixed(1)} / (${results.eta_a.toFixed(2)} × 0.97)
         = ${results.P_elec.toFixed(1)} W = ${(results.P_elec/1000).toFixed(3)} kW
    ├─ η_acc=${results.eta_a.toFixed(2)}: eficiencia VFD/inversor (calor + conmutación)
    ├─ η_cables=0.97: pérdidas en conductores DC (3% = resistencia óhmica)
    └─ Resumen eficiencias: η_bomba × η_acc × η_cables = ${(results.eta_b*results.eta_a*0.97).toFixed(3)} (${Math.round(results.eta_b*results.eta_a*0.97*100)}%)

PASO 5 — Potencia fotovoltaica requerida (kWp)
─────────────────────────────────────────────────────────
  ¿Por qué dividir por HSP?: El panel no produce su potencia nominal las 24h.
  Solo durante las horas de sol disponibles. HSP es la irradiación diaria total
  equivalente a 1 hora a 1000 W/m² (potencia nominal del panel).

  El factor 0.90 representa pérdidas del panel: temperatura (+5–8%), suciedad (3%),
  cableado DC (2%), degradación (1%), desajuste entre paneles (1%) = total ≈10%.

  HSP_efectivo = HSP_bruto × 0.90 = ${results.hsp_bruto} × 0.90 = ${results.hsp_ef.toFixed(2)} h/día

  kWp = (P_elec/1000 × FS) / HSP_ef
      = (${(results.P_elec/1000).toFixed(3)} × ${results.fs}) / ${results.hsp_ef.toFixed(2)}
      = ${results.kwp.toFixed(4)} kWp
    └─ FS=${results.fs}: factor de seguridad — amplía el kWp para cubrir
       variaciones climáticas, envejecimiento y mediciones imprecisas

PASO 6 — Número de paneles
─────────────────────────────────────────────────────────
  Con panel 550W:  ⌈${results.kwp.toFixed(3)}×1000/550⌉ = ${results.n_550} paneles → ${(results.n_550*550/1000).toFixed(2)} kWp instalado
  Con panel 730W:  ⌈${results.kwp.toFixed(3)}×1000/730⌉ = ${results.n_730} paneles → ${(results.n_730*730/1000).toFixed(2)} kWp instalado
    └─ ⌈⌉ = función techo: siempre se redondea HACIA ARRIBA (nunca quedarse corto)

PASO 7 — Volumen de almacenamiento
─────────────────────────────────────────────────────────
  Volumen diario producido = Q × h_bombeo
                           = ${results.Q} m³/h × ${results.h_bomb} h = ${results.vol_dia.toFixed(1)} m³/día

  ${results.conTanque
    ? `Tanque recomendado = V_día × días_autonomía = ${results.vol_dia.toFixed(1)} × ${form.autonomia_dias} = ${results.vol_tanque.toFixed(1)} m³
    └─ Cubre ${form.autonomia_dias} días de consumo sin sol (amortiguador climático)
    └─ Material: polietileno rotomoldeado (20+ años vida útil, bajo mantenimiento)`
    : `→ Sistema sin tanque: requiere banco de baterías para suministro nocturno
    └─ Capacidad baterías recomendada: ${(results.vol_dia * 9.81 * results.HDT / 3600 / results.eta_b / results.eta_a / 0.97 / 0.9).toFixed(1)} kWh (cobertura 1 noche)`
  }

EFICIENCIA GLOBAL DEL SISTEMA
─────────────────────────────────────────────────────────
  η_total = η_panel × η_MPPT × η_VFD × η_bomba × η_hidráulica
          = 0.90 × 0.97 × ${results.eta_a.toFixed(2)} × ${results.eta_b.toFixed(2)} × 0.95
          = ${(0.90*0.97*results.eta_a*results.eta_b*0.95).toFixed(3)} (${Math.round(0.90*0.97*results.eta_a*results.eta_b*0.95*100)}%)

  Interpretación: de cada 100W que generan los paneles,
  solo ${Math.round(0.90*0.97*results.eta_a*results.eta_b*0.95*100)}W se convierten en movimiento real de agua.
  Los ${100 - Math.round(0.90*0.97*results.eta_a*results.eta_b*0.95*100)}W restantes se disipan como calor en cada etapa de conversión.`}</div>
        </div>

        {results.pump_ok !== null && <div className={`alert ${results.pump_ok?"alert-success":"alert-warn"}`} style={{marginBottom:".75rem"}}>
          {results.pump_ok

            : `⚠️ La bomba seleccionada podría ser insuficiente para esta HDT. Verifique la curva H-Q en la pestaña correspondiente.`}
        </div>}

        <button className="btn btn-green" style={{padding:".65rem 1.5rem",fontSize:".85rem",fontWeight:700}}
          onClick={()=>onApply&&onApply(results.kwp, results.kwh_mes)}>
          ⚡ Transferir al Calculador Solar
        </button>
        <span style={{fontSize:".75rem",color:"var(--text3)",marginLeft:"1rem"}}>Aplica {results.kwh_mes.toFixed(0)} kWh/mes al módulo de dimensionamiento FV</span>
      </div>}

      {tab==="resultados" && !results && <div style={{textAlign:"center",padding:"3rem",color:"var(--text3)"}}>
        <div style={{fontSize:"2.5rem",marginBottom:".75rem",opacity:.4}}>💧</div>
        <div style={{fontSize:".95rem",fontWeight:600,color:"var(--text2)",marginBottom:".5rem"}}>Complete los parámetros y presione Calcular</div>
        <button className="btn btn-primary" onClick={()=>setTab("parametros")}>⚙️ Ir a Parámetros</button>
      </div>}

      {/* ── TAB: CURVA H-Q ────────────────────────────────────────────── */}
      {tab==="curva" && <div>
        {!selectedPump
          ? <div className="alert alert-info">💡 Seleccione una bomba en la pestaña <strong>Selección de bomba</strong> para ver su curva H-Q.</div>
          : <div className="card">

              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:".5rem",marginBottom:".75rem"}}>
                {[
                  ["Caudal diseño",`${form.Q} m³/h`,"Punto operación"],
                  ["BEP (caudal)",`${selectedPump.bep.q} m³/h`,"Máxima eficiencia"],
                  ["BEP (cabeza)",`${selectedPump.bep.h} m`,"Máxima eficiencia"],

      {/* ── TAB: COTIZACIÓN ───────────────────────────────────────────── */}
      {tab==="cotizacion" && results && <div>
        <div className="card">
          <div className="card-hdr"><span className="card-title">💰 Cotización estimada — Sistema de Bombeo Solar</span></div>
          <div style={{overflowX:"auto"}}>
            <table className="tbl">
              <thead><tr><th>Ítem</th><th>Descripción</th><th>Cant.</th><th>Precio unit.</th><th>Subtotal</th></tr></thead>
              <tbody>
                {[
                  ["Paneles solares",`Luxen LNVU-550M 550Wp Mono (${results.n_550} uds)`,results.n_550,348480,results.n_550*348480],

                  ...(form.conTanque?[["Tanque almacenamiento",`Tanque plástico ${results.vol_tanque.toFixed(0)}m³ (${results.autonomia_dias} días autonomía)`,1,results.costo_tanque,results.costo_tanque]]:[]),
                  ["Estructura","Estructura soporte aluminio + tornillería",Math.ceil(results.n_550/4),380000,Math.ceil(results.n_550/4)*380000],
                  ["Cableado y protecciones","Cable solar, fusibles DC, SPD Cat.II, conduit",1,600000,600000],
                  ["Sensor nivel","Sensor flotador para protección marcha en seco",1,120000,120000],

                ].map(([item,desc,qty,unit,sub],i)=>(
                  <tr key={i}>

// ── AUTH GATE — Controla si se muestra el Login o la App ─────────────────────
// ── Verificar si el usuario tiene membresía activa en profiles ────────────────
async function checkUserActivo(userId) {
  try {
    const { data, error } = await _sb
      .from("profiles")
      .select("activo")
      .eq("id", userId)
      .single();
    if (error) return false;
    return data?.activo === true;
  } catch(e) {
    return false;
  }
}

function AuthGate() {
  const [authState, setAuthState] = useState("checking"); // "checking"|"login"|"app"|"blocked"
  const [user, setUser]           = useState(null);

  const verificarAcceso = async (session) => {
    if (!session) { setAuthState("login"); return; }
    // ── VERIFICACIÓN CRÍTICA: comprobar activo en profiles ──
    const activo = await checkUserActivo(session.user.id);
    if (!activo) {
      // Usuario bloqueado — cerrar sesión y mostrar mensaje
      await _sb.auth.signOut();
      setAuthState("blocked");
      return;
    }
    _currentUser = session.user;
    setUser(session.user);
    setAuthState("app");
  };

  useEffect(() => {
    _sb.auth.getSession().then(({ data: { session } }) => {
      verificarAcceso(session);
    });
    const { data: { subscription } } = _sb.auth.onAuthStateChange((event, session) => {
      if (event === "SIGNED_OUT" || !session) {
        _currentUser = null;
        setUser(null);
        setAuthState("login");
        return;
      }
      verificarAcceso(session);
    });
    return () => subscription.unsubscribe();
  }, []);

  if (authState === "checking") return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",
      minHeight:"100vh",background:"#0d1117",color:"#f59e0b",fontFamily:"sans-serif",flexDirection:"column",gap:"1rem"}}>
      <div style={{width:40,height:40,border:"3px solid rgba(245,158,11,.2)",
        borderTop:"3px solid #f59e0b",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <span style={{fontSize:".85rem",color:"#484f58"}}>Verificando acceso...</span>
    </div>
  );

  // ── Pantalla de membresía inactiva ─────────────────────────────────────────
  if (authState === "blocked") return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",
      minHeight:"100vh",background:"#0d1117",fontFamily:"'Inter',sans-serif",
      flexDirection:"column",gap:"1rem",padding:"2rem",textAlign:"center"}}>
      <div style={{fontSize:"3rem",marginBottom:".5rem"}}>🔒</div>
      <h2 style={{color:"#e6edf3",fontSize:"1.2rem",fontWeight:700,marginBottom:".5rem"}}>
        Membresía inactiva
      </h2>
      <p style={{color:"#8b949e",fontSize:".85rem",lineHeight:1.6,maxWidth:360,marginBottom:"1.5rem"}}>
        Tu acceso a SolarMind Designer Pro está suspendido. Para reactivar tu membresía
        contáctanos a través de la plataforma donde realizaste tu compra.
      </p>
      <button onClick={()=>setAuthState("login")}
        style={{padding:".65rem 1.75rem",background:"linear-gradient(135deg,#f59e0b,#d97706)",
          border:"none",borderRadius:8,color:"#1a1200",fontWeight:700,
          fontSize:".88rem",cursor:"pointer",fontFamily:"inherit"}}>
        Volver al inicio de sesión
      </button>
    </div>
  );

  if (authState === "login") return <LoginScreen onLogin={(u)=>{setUser(u);setAuthState("app");}}/>;

  return <App userEmail={user?.email || ""}/>;
}

  const [form, setForm] = useState({
    nombre_proyecto: "", nombre_cliente: "",

    region: "Bogotá", tipo_sistema: "off-grid",

  });
  const sf = (k, v) => {

    if (formErrors[k]) setFormErrors(e => { const n={...e}; delete n[k]; return n; });

    if (!form.region || form.region.trim().length < 2) errors.region = "Ingrese la ciudad o región";
    if (form.tipo_sistema !== "on-grid" && (!form.dias_autonomia || Number(form.dias_autonomia) < 1)) errors.dias_autonomia = "Días de autonomía debe ser ≥ 1";

  // ── Load Template ──────────────────────────────────────────────────────────
  const loadTemplate = (tpl) => {

  // ── Share by Link ──────────────────────────────────────────────────────────

    try {
      const payload = { form };

  const copyShareUrl = () => {
    navigator.clipboard.writeText(shareUrl).then(() => { setShareCopied(true); setTimeout(() => setShareCopied(false), 2500); }).catch(() => {

    });
  };

  // Load shared project from URL hash on init
  useEffect(() => {
    const hash = window.location.hash;
    if (hash.startsWith("#share=")) {
      try {
        const decoded = JSON.parse(decodeURIComponent(atob(hash.slice(7))));
        if (decoded.form) { setForm(f => ({ ...f, ...decoded.form })); setView("calc"); }
      } catch(e){}
    }
  }, []);

  // ── PDF Export ─────────────────────────────────────────────────────────────
  const exportPDF = () => {
    if (!results) return;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
    const s = results.summary;
    const W = doc.internal.pageSize.getWidth();   // 210 mm
    const H = doc.internal.pageSize.getHeight();  // 297 mm
    const ML = 14, MR = 14;                       // left / right margins
    const usableW = W - ML - MR;                  // 182 mm usable
    const FOOTER_H = 14;
    const MAX_Y = H - FOOTER_H - 4;              // last usable y before footer
    let y = 0;

    /* ── helpers ── */
    const safeText = (raw) => String(raw ?? "—").replace(/\u2019/g,"'").replace(/[\u2018\u201c\u201d]/g,'"');
    const txt = (text, x, yy, opts={}) => {
      doc.setFontSize(opts.size || 9);
      doc.setFont("helvetica", opts.bold ? "bold" : "normal");
      doc.setTextColor(...(opts.color || [50,50,50]));
      const t = safeText(text);
      if (opts.maxW) {
        const lines = doc.splitTextToSize(t, opts.maxW);
        doc.text(lines, x, yy, opts.align ? {align:opts.align} : undefined);
        return lines.length;
      }
      doc.text(t, x, yy, opts.align ? {align:opts.align} : undefined);
      return 1;
    };
    const newPage = () => {
      addFooter();
      doc.addPage();
      y = 14;
    };
    const checkPage = (needed = 12) => { if (y + needed > MAX_Y) newPage(); };
    const sectionBar = (title) => {
      checkPage(14);
      doc.setFillColor(15,35,64); doc.rect(ML, y, usableW, 7, "F");
      doc.setFillColor(245,158,11); doc.rect(ML, y+7, usableW, 1.2, "F");
      txt(title, ML+3, y+5, {size:8.5, bold:true, color:[255,255,255]});
      y += 11;
    };
    const addFooter = () => {
      const pg = doc.internal.getNumberOfPages();
      doc.setFillColor(240,242,246); doc.rect(0, H-FOOTER_H, W, FOOTER_H, "F");

  useEffect(() => {
    // Detectar si ya está instalado como PWA
    const isStandalone = window.matchMedia("(display-mode: standalone)").matches
      || window.navigator.standalone === true;
    if (isStandalone) { setPwaInstalled(true); return; }

    // Detectar iOS (Safari no soporta beforeinstallprompt)
    const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isSafari = /safari/i.test(navigator.userAgent) && !/chrome|crios|fxios/i.test(navigator.userAgent);
    if (isIos && isSafari) {
      setShowIosInstall(true);
      setShowInstallBanner(true);
    }

    // Android / Chrome — capturar evento y SIEMPRE mostrar nuestro botón propio
    const onBeforeInstall = e => {
      e.preventDefault(); // Evita el mini-banner nativo de Chrome
      setPwaInstallPrompt(e);
      setShowInstallBanner(true); // Mostrar nuestro botón persistente
    };

    const onAppInstalled = () => {
      setPwaInstalled(true);
      setPwaInstallPrompt(null);
      setShowIosInstall(false);
      setShowInstallBanner(false);
    };

    const onSwUpdate = () => setSwUpdateReady(true);

    // Si el evento ya fue capturado antes (re-render), mostrar banner igualmente
    // Guardar intención en sessionStorage para persistir entre renders
    if (sessionStorage.getItem("sm_pwa_prompt_available") === "1") {
      setShowInstallBanner(true);
    }

    window.addEventListener("beforeinstallprompt", e => {
      sessionStorage.setItem("sm_pwa_prompt_available", "1");
      onBeforeInstall(e);
    });
    window.addEventListener("appinstalled", onAppInstalled);
    window.addEventListener("sw-update-ready", onSwUpdate);

    return () => {
      window.removeEventListener("beforeinstallprompt", onBeforeInstall);
      window.removeEventListener("appinstalled", onAppInstalled);
      window.removeEventListener("sw-update-ready", onSwUpdate);
    };
  }, []);

        created_at: new Date().toISOString(),
        user_id:    user.id,   // ← RLS filtrará por este campo

      const { data, error } = await _sb.from("sm_projects").insert([payload]).select();

    setForm(inputs);
    setView("calc");
    setTab("summary");
    setLoading(true);
    setTimeout(() => {
      try {
        const r = calculate({ ...inputs, advanced_mode: !!(inputs.panel_wp_custom) }, catalog);
        setResults(r);
        const s = r.summary;
        const st = r.selected_topo;
        let defaultQi = [
          { id: 1, desc: `Panel solar ${s.panel_wp}Wp — ${s.panel_name}`, qty: s.n_paneles, unit_price: r.panel.price || 270000, total: s.n_paneles * (r.panel.price || 270000) },
        ];
        if (r.topo === "ongrid") {
          defaultQi.push({ id: 2, desc: `Inversor On-Grid ${st.kw.toFixed(1)}kW MPPT integrado — ${st.model}`, qty: 1, unit_price: st.cost, total: st.cost });
        } else if (r.topo === "hybrid") {
          defaultQi.push({ id: 2, desc: `Inversor Híbrido ${st.kw.toFixed(1)}kW (MPPT + cargador integrado) — ${st.model}`, qty: 1, unit_price: st.cost, total: st.cost });
        } else if (r.topo === "mppt_pure") {
          defaultQi.push({ id: 2, desc: `Controlador MPPT ${s.i_mppt_req}A — ${r.ctrl_options.mppt_solo.model}`, qty: 1, unit_price: r.ctrl_options.mppt_solo.cost_est, total: r.ctrl_options.mppt_solo.cost_est });
          defaultQi.push({ id: 3, desc: `Inversor onda pura ${st.kw.toFixed(1)}kW — ${st.equipo_inv}`, qty: 1, unit_price: st.cost - r.ctrl_options.mppt_solo.cost_est, total: st.cost - r.ctrl_options.mppt_solo.cost_est });
        } else {
          defaultQi.push({ id: 2, desc: `Controlador PWM 20-30A 12/24V`, qty: 1, unit_price: 200000, total: 200000 });
          defaultQi.push({ id: 3, desc: `Inversor onda pura ${st.kw.toFixed(1)}kW — ${st.equipo_inv}`, qty: 1, unit_price: st.cost - 200000, total: st.cost - 200000 });
        }
        defaultQi.push(
          { id: 4, desc: "Estructura soporte aluminio inclinada", qty: Math.ceil(s.n_paneles / 4), unit_price: 380000, total: Math.ceil(s.n_paneles / 4) * 380000 },
          { id: 5, desc: "Cableado, protecciones y SPD Cat.II", qty: 1, unit_price: 800000, total: 800000 }
        );
        if (s.bat) defaultQi.push({ id: 6, desc: `Batería LiFePO4 48V 100Ah — ${s.bat.n_pylo} módulo(s) × 4.8kWh`, qty: s.bat.n_pylo, unit_price: 4800000, total: s.bat.n_pylo * 4800000 });
        const qi = p.quoteItems && p.quoteItems.length ? p.quoteItems : defaultQi;
        setQuoteItems(qi);
      } catch(e) { console.error("loadProject error:", e); }
      setLoading(false);
    }, 200);
  };

  const callLLM = async () => {
    if (!results) return;
    const key = apiKey || window.SM_CONFIG?.GEMINI_KEY || "";
    if (!key) {
      setLlmResult({ resumen: "⚠️ Configure su API Key de Groq en Modo Avanzado → IA & Nube. Es completamente gratuita — sin tarjeta de crédito." });
      return;
    }
    setLlmLoading(true); setLlmResult(null);
    // Leer siempre de `form` (estado actual) — correcto tanto para cálculo nuevo como proyecto cargado
    const tipo   = form.tipo_sistema || "off-grid";
    const region = form.region || "Colombia";
    const consumo = form.consumo_mensual_kwh || 150;
    const cobertura = Math.round((form.porcentaje_cobertura || 1) * 100);

    const s  = results.summary;
    const cd = s.capex_detail || {};

    const systemPrompt = `Eres SolarMind AI, un ingeniero fotovoltaico certificado con 15 años de experiencia en Colombia y Latinoamérica. Conoces RETIE, UPME y condiciones climáticas colombianas. Generas informes técnico-comerciales profesionales para instaladoras de energía solar.
REGLAS: Responde ÚNICAMENTE con JSON válido sin markdown ni backticks. Mínimo 150 palabras por sección. Referencias a RETIE/UPME donde aplique.`;

    const userPrompt = `Genera un informe técnico-comercial completo con estos datos del sistema solar:

SISTEMA: Tipo=${tipo} | Región=${region} | Consumo=${consumo} kWh/mes | Cobertura=${cobertura}%
ARREGLO: ${s.kwp_inst} kWp instalados (req. ${s.kwp_final}) | ${s.n_paneles} paneles ${s.panel_name} ${s.panel_wp}Wp | Config ${s.n_serie}S×${s.n_par}P | Voc frío=${s.voc_str}V | Vmp=${s.vmp_str}V
ELÉCTRICO: VDC=${s.v_bat}V | IMPPT=${s.i_mppt_req}A | Inversor=${s.p_inv}kW | Cable=${s.s_norm}mm² | HSP=${s.hsp}h/día | Tmin=${s.temp_min}°C
ECONÓMICO: Ahorro anual=$${fmt(s.ah_ano)} COP | CAPEX=$${fmt(s.capex)} COP | Payback=${s.payback} años | ROI10a=${(((s.ah_ano*10)-s.capex)/s.capex*100).toFixed(1)}%
TOPOLOGÍA: ${s.selected_topo?.label || "N/D"} | Modelo=${s.selected_topo?.model || "N/D"}
CAPEX DETALLE: Paneles=$${fmt(cd.paneles||0)} | Equipo control=$${fmt(cd.equipo_control||0)} | Baterías=$${fmt(cd.baterias||0)} | Estructura=$${fmt(cd.estructura||0)} | Cables=$${fmt(cd.otros||0)} | MO=$${fmt(cd.mano_obra||0)}

Devuelve EXACTAMENTE este JSON (sin nada más antes ni después):
{"resumen":"[200-250 palabras ejecutivas con KPIs narrativos y beneficios para el cliente]","evaluacion_tecnica":"[250-300 palabras: validación dimensionamiento, strings, RETIE, región climática]","analisis_economico":"[200-250 palabras: CAPEX, payback Colombia, proyección 25 años con inflación tarifaria 10% anual]","recomendaciones":"[6-8 recomendaciones técnicas accionables con justificación]","riesgos":"[Riesgos técnicos, regulatorios y financieros con probabilidad e impacto]","propuesta_comercial":"[180-220 palabras persuasivas para enviar al cliente con llamada a la acción]","cronograma":"[5-7 fases de implementación con duración estimada]","mantenimiento":"[Plan trimestral, semestral y anual de mantenimiento preventivo]"}`;

    // Groq modelos gratuitos en orden de preferencia
    const MODELS = [
      "llama-3.3-70b-versatile",
      "llama-3.1-8b-instant",
      "gemma2-9b-it",
    ];

    const errors = [];
    for (const model of MODELS) {
      try {
        const resp = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${key}`
          },
          body: JSON.stringify({
            model,
            temperature: 0.4,
            max_tokens: 4096,
            messages: [
              { role: "system", content: systemPrompt },
              { role: "user", content: userPrompt }
            ]
          })
        });
        const data = await resp.json();
        if (data.error) {
          const msg = String(data.error.message || data.error.type || "error desconocido");
          errors.push(`${model}: ${msg.slice(0, 100)}`);
          if (resp.status === 429 || msg.includes("rate") || msg.includes("limit")) continue;
          throw new Error(msg);
        }
        const raw = data.choices?.[0]?.message?.content || "";
        const clean = raw.replace(/```json\n?|```\n?/g, "").trim();
        const i1 = clean.indexOf("{"), i2 = clean.lastIndexOf("}");
        const parsed = i1 >= 0 ? JSON.parse(clean.slice(i1, i2 + 1)) : { resumen: clean };
        parsed._modelo = model;
        setLlmResult(parsed);
        setLlmLoading(false);
        return;
      } catch (e) {
        errors.push(`${model}: ${String(e.message).slice(0, 100)}`);
        if (!String(e.message).toLowerCase().includes("rate") && !String(e.message).includes("429")) break;
      }
    }

    setLlmResult({
      resumen: "⚠️ No se pudo generar el informe con Groq.",
      evaluacion_tecnica: `DIAGNÓSTICO:\n${errors.join("\n")}\n\nVERIFIQUE:\n• Que la API Key sea de Groq (console.groq.com), no de Google/Anthropic\n• Que empiece con "gsk_"\n• Que copió la key completa sin espacios\n• Reintente en 1 minuto si es error de tasa`,
      analisis_economico: "", recomendaciones: "", riesgos: "", propuesta_comercial: "", cronograma: "", mantenimiento: ""
    });
    setLlmLoading(false);
  };

  const updQ = (id, field, val) => setQuoteItems(items => items.map(i => {

    const u = { ...i, [field]: ["qty", "unit_price"].includes(field) ? Number(val) : val };
    if (["qty", "unit_price"].includes(field)) u.total = u.qty * u.unit_price;
    return u;

  const qSub = quoteItems.reduce((a, i) => a + i.total, 0);
  const qLabor = qSub * (quoteLaborPct / 100);
  const qTax = qSub * (quoteTax / 100);

    ...quoteItems.map(i => [i.desc, i.qty, i.unit_price, i.total]),
    ["", "", "Mano de obra", Math.round(qLabor)], ["", "", "IVA", Math.round(qTax)], ["", "", "TOTAL", Math.round(qTotal)]];
    const blob = new Blob([rows.map(r => r.join(",")).join("\n")], { type: "text/csv" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = `cotizacion_${form.nombre_proyecto || "solar"}_${Date.now()}.csv`; a.click();
  };

  const TABS = [{ id: "summary", l: "📊 Resumen" }, { id: "charts", l: "📈 Gráficas" }, { id: "steps", l: "🔢 Detalle técnico" }, { id: "elec", l: "⚡ Config. eléctrica" }, { id: "quote", l: "💰 Cotización" }, { id: "compare", l: "🔋 Comparativa" }, { id: "llm", l: "🤖 IA" }, { id: "catalog", l: "📦 Catálogo" }];

    <div className="section-lbl">Datos del sistema</div>

      <input type="number" className={formErrors.consumo_mensual_kwh?"invalid":""} value={form.consumo_mensual_kwh} onChange={e => sf("consumo_mensual_kwh", +e.target.value)} min="1" />
      {formErrors.consumo_mensual_kwh && <div className="field-error">⚠ {formErrors.consumo_mensual_kwh}</div>}
    </Field>
    <Field label="Tarifa energía (COP/kWh)" hint="Precio por kWh de la factura">
      <input type="number" className={formErrors.precio_kwh_cop?"invalid":""} value={form.precio_kwh_cop} onChange={e => sf("precio_kwh_cop", +e.target.value)} min="1" />

    <Field label="Tipo de sistema"><select value={form.tipo_sistema} onChange={e => sf("tipo_sistema", e.target.value)}><option value="on-grid">On-Grid (conectado a red)</option><option value="off-grid">Off-Grid (autónomo)</option><option value="hibrido">Híbrido</option></select></Field>
    <Field label="Cobertura solar"><select value={form.porcentaje_cobertura} onChange={e => sf("porcentaje_cobertura", +e.target.value)}><option value={0.5}>50%</option><option value={0.8}>80%</option><option value={1.0}>100%</option></select></Field>

      <input type="number" className={formErrors.dias_autonomia?"invalid":""} value={form.dias_autonomia} onChange={e => sf("dias_autonomia", +e.target.value)} min="1" max="10" />
      {formErrors.dias_autonomia && <div className="field-error">⚠ {formErrors.dias_autonomia}</div>}
    </Field>}

    {mode === "advanced" && <>

              {[

                { k: "Gel/AGM", best: false, rows: [["Capacidad req.", `${s.bat.c_gel.toFixed(2)} kWh`], ["Capacidad Ah", `${s.bat.ah_gel.toFixed(0)} Ah @ ${s.v_bat}V`], ["Config.", `${s.bat.n_gel_p}P × ${s.bat.n_gel_s}S Trojan T-105`], ["DoD", "50%"], ["Ciclos", "1,200"], ["Vida útil", "3–5 años"], ["Peso", `${s.bat.n_gel * 30} kg`], ["CAPEX", `$${fmt(s.bat.capex_gel)}`], ["TCO 15 años", `$${fmt(s.bat.tco_gel)}`]] },
                { k: "AGM 12V", best: false, rows: [["Capacidad req.", `${s.bat.c_agm.toFixed(2)} kWh`], ["Capacidad Ah", `${((s.bat.c_agm*1000)/s.v_bat).toFixed(0)} Ah @ ${s.v_bat}V`], ["Config.", `${s.bat.n_agm_p}P × ${s.bat.n_agm_s}S AGM 12V 200Ah`], ["DoD", "60%"], ["Ciclos", "1,000"], ["Vida útil", "3–4 años"], ["Peso", `${s.bat.n_agm * 55} kg`], ["CAPEX", `$${fmt(s.bat.capex_agm)}`], ["TCO 15 años", `$${fmt(s.bat.tco_agm)}`]] },
              ].map(c => <div key={c.k} className={`compare-card ${c.best ? "best" : ""}`}>
                <div className="compare-card-title">{c.best ? <span className="badge">RECOM.</span> : null}{c.k}</div>
                {c.rows.map(([k, v]) => <div key={k} className="info-row" style={{ fontSize: ".78rem" }}><span className="info-key">{k}</span><span className="info-val">{v}</span></div>)}
              </div>)}
            </div>
            <div className="alert alert-info" style={{ marginTop: ".85rem" }}>
              💡 <strong>Conclusión técnica:</strong> LiFePO4 tiene mayor CAPEX inicial pero menor TCO a largo plazo gracias a más ciclos y mayor DoD. Para proyectos con horizonte &gt;5 años y acceso a financiamiento, es la opción óptima. Gel/AGM solo se justifica con restricción presupuestaria estricta y capacidad de mantenimiento regular (limpieza, revisión de electrolito, reemplazo cada 3-5 años).
            </div>
          </> : <p style={{ color: "var(--text3)", fontSize: ".83rem" }}>Comparativa de baterías disponible solo para sistemas Off-Grid e Híbridos.</p>}
        </div>
      </div>}

      {/* LLM */}
      {tab === "llm" && <div className="card">
        <div className="card-hdr">

              <span style={{fontSize:".78rem",fontWeight:700,color:"var(--text)"}}>SolarMind AI — Groq (LLaMA 3.3 70B)</span>
              <span style={{fontSize:".68rem",marginLeft:"auto",padding:".15rem .4rem",borderRadius:"999px",background:apiKey?"rgba(16,185,129,.15)":"rgba(245,158,11,.15)",color:apiKey?"var(--green)":"var(--accent-dark)",fontWeight:600}}>{apiKey?"API Key ✓ — GRATIS":"Sin API Key"}</span>

            ["1","Abra","console.groq.com","en su navegador"],
            ["2","Haga clic en","Sign Up","e inicie sesión con Google"],
            ["3","En el menú izquierdo clic en","API Keys","→ \"Create API key\""],
            ["4","Copie la clave","(empieza con gsk_...)",""],
            ["5","Vaya a","Modo Avanzado → IA & Nube","y péguela allí"],
          ].map(([n,a,b,c])=>(

              <span style={{minWidth:18,height:18,borderRadius:"50%",background:"var(--blue)",color:"#fff",fontSize:".65rem",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>{n}</span>
              <span style={{fontSize:".75rem",color:"var(--text2)"}}>{a} <strong style={{color:"var(--text)"}}>{b}</strong> {c}</span>
            </div>
          ))}
          <div style={{fontSize:".72rem",color:"var(--text3)",marginTop:".5rem",paddingTop:".5rem",borderTop:"1px solid rgba(59,130,246,.15)"}}>
            ✅ <strong>Sin tarjeta de crédito.</strong> Groq ofrece LLaMA 3.3 70B, Gemma 2 y otros modelos de forma completamente gratuita con límites muy generosos (14.400 peticiones/día).
          </div>
        </div>}
        <button className="btn btn-primary" onClick={callLLM} disabled={llmLoading} style={{marginBottom:"1rem",padding:".65rem 1.5rem",fontSize:".88rem"}}>
          {llmLoading ? <><span className="spinner" /> Generando informe profesional...</> : "🤖 Generar Informe Completo con IA"}
        </button>
        {llmLoading && <div className="alert alert-info" style={{fontSize:".77rem",marginBottom:".75rem"}}>
          ⏳ La IA está analizando su sistema y redactando el informe completo. Esto puede tomar 15–30 segundos...
        </div>}
        {llmResult && <div className="llm-output">
          {[
            { k:"resumen", l:"📋 Resumen Ejecutivo", color:"var(--blue)" },
            { k:"evaluacion_tecnica", l:"🔧 Evaluación Técnica", color:"var(--accent-dark)" },
            { k:"analisis_economico", l:"💰 Análisis Económico", color:"var(--green)" },

              <div className="llm-text" style={{fontSize:".84rem",lineHeight:1.8,whiteSpace:"pre-wrap"}}>{llmResult[x.k]}</div>
            </div>
          ))}
          <div style={{display:"flex",gap:".5rem",marginTop:".5rem",paddingTop:".75rem",borderTop:"1px solid var(--border)"}}>
            <button className="btn btn-secondary" style={{fontSize:".75rem"}} onClick={() => {
              const text = Object.entries(llmResult).filter(([,v])=>v).map(([k,v])=>`=== ${k.toUpperCase()} ===\n${v}`).join("\n\n");
              const blob = new Blob([text],{type:"text/plain"});
              const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
              a.download = `Informe_IA_${(form.nombre_proyecto||"solar").replace(/\s+/g,"_")}.txt`; a.click();

            <button className="btn btn-secondary" style={{fontSize:".75rem"}} onClick={() => {

  return <div className="app">

        <div style={{display:"flex",gap:".5rem",flexWrap:"wrap"}}>
          <button className={`btn ${shareCopied?"btn-green":"btn-primary"}`} style={{flex:1}} onClick={copyShareUrl}>

          <button className="btn btn-secondary" onClick={()=>{window.open(`https://wa.me/?text=`+encodeURIComponent("SolarMind Pro - Proyecto solar: "+shareUrl),"_blank");}}>💬 WhatsApp</button>
          <button className="btn btn-secondary" onClick={()=>{window.open(`mailto:?subject=Proyecto Solar SolarMind&body=`+encodeURIComponent("Le comparto el proyecto fotovoltaico diseñado en SolarMind Designer Pro:\n\n"+shareUrl),"_blank");}}>✉️ Email</button>
        </div>
        <div className="alert alert-warn" style={{marginTop:".75rem",fontSize:".75rem"}}>
          ⚠️ El enlace contiene los parámetros del formulario. Al abrirlo en otro dispositivo se pre-cargarán los datos y se podrá recalcular. Para compartir resultados finales use la exportación PDF.
        </div>
      </div>
    </div>}
    <header className="header">
      <div className="logo" onClick={() => setView("dashboard")} style={{ cursor: "pointer" }}>
        <div style={{background:"#fff",borderRadius:10,padding:"3px 6px",display:"inline-flex",alignItems:"center"}}>
          <img src={window.LOGO_SRC} alt="SolarMind" style={{ height: 34, display:"block", objectFit:"contain" }} />
        </div>
      </div>
      <nav className="header-nav">
        <button className={`nav-btn ${view === "dashboard" ? "active" : ""}`} onClick={() => setView("dashboard")}>🏠 Inicio</button>
        <button className={`nav-btn ${view === "calc" ? "active" : ""}`} onClick={() => setView("calc")}>⚡ Calculadora</button>
        <button className={`nav-btn ${view === "history" ? "active" : ""}`} onClick={() => setView("history")}>📋 Historial{projects.length > 0 && <span className="badge" style={{ marginLeft: ".3rem", fontSize: ".6rem" }}>{projects.length}</span>}</button>
        <button className={`nav-btn ${view === "consumo" ? "active" : ""}`} onClick={() => setView("consumo")}>🔌 Consumo</button>
        <button className={`nav-btn ${view === "picos" ? "active" : ""}`} onClick={() => setView("picos")}>⚡ Picos Arranque</button>
        <button className={`nav-btn ${view === "bombeo" ? "active" : ""}`} onClick={() => setView("bombeo")}>💧 Bombeo Solar</button>

          title="Nueva versión disponible">🔄 Actualizar</button>}

        {/* ── Botón instalar — persistente, Android y iOS ── */}
        {!pwaInstalled && showInstallBanner && (
          <button
            className="btn"
            style={{
              fontSize:".75rem", padding:".35rem .85rem",
              background:"linear-gradient(135deg,var(--accent) 0%,#f97316 100%)",
              color:"#000", fontWeight:700, border:"none",
              boxShadow:"0 2px 8px rgba(245,158,11,.45)",
              display:"flex", alignItems:"center", gap:".35rem", flexShrink:0

            onClick={() => {

                pwaInstallPrompt.prompt();

                  if (r.outcome === "accepted") {
                    setPwaInstalled(true);
                    setShowInstallBanner(false);

                  setPwaInstallPrompt(null);

        <button className="btn btn-danger" style={{fontSize:".72rem",padding:".3rem .7rem"}}

        borderTop:"2px solid var(--accent)",
        padding:".75rem 1.25rem",

        gap:".75rem", boxShadow:"0 -4px 20px rgba(0,0,0,.35)",
        fontFamily:"var(--sans)"
      }}>
        <div style={{display:"flex",alignItems:"center",gap:".65rem",flex:1,minWidth:0}}>
          <img src={window.LOGO_SRC} alt="SolarMind" style={{height:36,flexShrink:0,borderRadius:6}}/>
          <div>
            <div style={{fontSize:".82rem",fontWeight:700,color:"#fff"}}>Instalar SolarMind Designer Pro</div>
            <div style={{fontSize:".7rem",color:"rgba(255,255,255,.65)"}}>Acceso rápido desde tu pantalla de inicio, sin necesidad de abrir el navegador</div>

                pwaInstallPrompt.userChoice.then(r => {
                  if (r.outcome === "accepted") {
                    setPwaInstalled(true);
                    setShowInstallBanner(false);
                    sessionStorage.removeItem("sm_pwa_prompt_available");
                  }
                  setPwaInstallPrompt(null);
                });
              } else {
                const m = document.getElementById("ios-install-modal");
                if (m) m.style.display = "flex";
              }

          >📲 Instalar</button>
          <button
            style={{
              padding:".45rem .75rem", borderRadius:8,
              background:"rgba(255,255,255,.12)", color:"rgba(255,255,255,.7)",
              fontSize:".78rem", border:"1px solid rgba(255,255,255,.2)",
              cursor:"pointer"
            }}
            onClick={() => setShowInstallBanner(false)}
            title="Cerrar — el botón de instalación seguirá en la barra superior"
          >✕</button>
        </div>
      </div>
    )}

    <div className="main-content" style={!pwaInstalled && showInstallBanner ? {paddingBottom:"72px"} : {}}>
      {view === "dashboard" && Dashboard()}
      {view === "history" && <HistoryView projects={projects} onLoad={loadProject} onDelete={deleteProject} onNew={() => { setResults(null); setView("calc"); }} />}
      {view === "consumo" && <ConsumoView appliances={appliances} setAppliances={setAppliances} onApply={(kwh) => { sf("consumo_mensual_kwh", kwh); setView("calc"); }} />}
      {view === "picos" && <PicosArranqueView onApplyPeak={(kw) => { sf("demanda_max_kw", kw); setView("calc"); }} />}
      {view === "bombeo" && <BombeoSolarView onApply={(kwp, consumo) => { sf("consumo_mensual_kwh", consumo); sf("tipo_sistema", "on-grid"); setView("calc"); }} />}
      {view === "calc" && <div className="calc-layout">
        {Sidebar()}
        <main style={{ flex: 1, overflowY: "auto", padding: "1.5rem" }}>
          {CalcResults()}
        </main>
      </div>}
    </div>

    {/* ── Modal instrucciones iOS ── */}
    <div id="ios-install-modal" style={{
      display:"none",position:"fixed",inset:0,zIndex:9998,
      background:"rgba(0,0,0,.75)",alignItems:"flex-end",justifyContent:"center",
      fontFamily:"var(--sans)"
    }} onClick={e=>{ if(e.target.id==="ios-install-modal") e.target.style.display="none"; }}>
      <div style={{
        background:"var(--surface)",borderRadius:"16px 16px 0 0",

      }}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.25rem"}}>
          <div>
            <div style={{fontSize:"1rem",fontWeight:700,color:"var(--text)"}}>📲 Instalar SolarMind</div>

        ))}
        <div style={{fontSize:".7rem",color:"var(--text3)",textAlign:"center",marginTop:".75rem",lineHeight:1.5}}>
          ⚠️ Solo funciona desde <strong style={{color:"var(--text2)"}}>Safari</strong> en iPhone/iPad.<br/>
          Si usas Chrome en iOS, abre esta página en Safari primero.
        </div>
      </div>
    </div>

  </div>;
}
